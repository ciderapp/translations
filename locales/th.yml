oobe.audio.text: |-
  Cider มาพร้อมกับระบบเสียงที่ปรับแต่งและออกแบบมาโดยเฉพาะเพื่อมอบประสบการณ์เสียงคุณภาพสูงที่เต็มอิ่ม
  ประกอบด้วย Cider Adrenaline, Atmosphere Realizer และ Spatialized Audio
  หากต้องการเปิดใช้งานคุณสมบัตินี้ จะต้องเปิดใช้งาน "ฟังก์ชันเสียงขั้นสูง"
  การเปิดใช้งานฟังก์ชันเสียงขั้นสูงจะช่วยให้คุณเข้าถึงการปรับปรุงเหล่านี้ได้ใน Cider Audio Labs ซึ่งอยู่ในส่วนการตั้งค่าของแอป
