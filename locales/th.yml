oobe.intro.text: เรามาตั้งค่าบางอย่างเพื่อจะได้ใช้ Cider กันแบบที่คุณชอบ คุณสามารถเปลี่ยนแปลงการตั้งค่าทั้งหมดนี้ได้ภายหลัง
