oobe.amupsell.explainBtn: อธิบาย
oobe.amupsell.promoExplained: "บางโปรโมชั่น หรือ สิทธิ์ทดลองใช้ที่อยู่นอกสหรัฐ ฯ อาจไม่สามารถเข้าถึง Apple Music Web Player API ที่ Cider ต้องการ ถ้าต้องการตรวจสอบว่าสามารถใช้งานได้ ไปที่  <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a> เข้าสู่ระบบ และลองเล่นสักเพลง ถ้าหากใช้งานได้ ดีเลย! คุณพร้อมที่จะใช้ Cider แล้ว แต่ถ้าไม่ คุณควรจะสมัครสมาชิก Apple Music ผ่านที่นี้ : <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: สมัครสมาชิก Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider จำเป็นต้องใช้กับสมาชิก Apple Music ที่ยังสามารถเข้าใช้งานได้เท่านั้น
  Cider ไม่สามารถใช้ร่วมกับ Apple Music Voice Plan หรือ สิทธิ์ทดลองใช้ที่เป็นรูปแบบโปรโมชั่นได้ ถ้าคุณมีสมาชิกตรงตามที่แจ้งไปข้างต้น กด ต่อไป เพื่อดำเนินการต่อ
