oobe.amupsell.text: |-
  Cider ต้องใช้การสมัครสมาชิก Apple Music ที่ใช้งานอยู่และชำระเงินแล้ว
  Cider จะไม่สามารถใช้งานร่วมกับ Apple Music Voice Plan หรือการสมัครสมาชิกทดลองใช้ที่เป็นโปรโมชันบางรายการได้ หากคุณมีการสมัครสมาชิก Apple Music ที่ตรงตามเงื่อนไขอยู่แล้ว ให้คลิก ถัดไป เพื่อดำเนินการต่อ
