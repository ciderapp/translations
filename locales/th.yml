settings.troubleshooting.impressionReporting.warning2: นี่คือข้อมูลการวัดและส่งข้อมูลทางไกลขาออกไปยัง Apple นอกเหนือจากสตรีม PlayActivity ที่ Cider ส่งอยู่แล้ว เปิดใช้งานเฉพาะในกรณีที่คุณต้องการความเท่าเทียมในการปรับแต่งส่วนบุคคลอย่างสมบูรณ์กับ music.apple.com เท่านั้น
