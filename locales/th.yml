oobe.amupsell.promoExplained: "การสมัครสมาชิก Apple Music รุ่นทดลองใช้บางรายการที่เป็นโปรโมชันและนอกสหรัฐอเมริกาจะไม่สามารถเข้าถึง Apple Music Web Player API ที่จำเป็นสำหรับการทำงานของ Cider ได้ หากต้องการตรวจสอบว่าการทดลองใช้ที่ใช้งานอยู่ของคุณสามารถใช้กับ Cider ได้หรือไม่ ให้ไปที่ <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a> เข้าสู่ระบบแล้วลองเล่นเพลง หากเล่นได้ แสดงว่ายอดเยี่ยมมาก! คุณพร้อมที่จะใช้งาน Cider แล้ว แต่หากเล่นไม่ได้ โปรดพิจารณาสมัครสมาชิก Apple Music ที่นี่: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
