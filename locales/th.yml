smartPlaylist.writeMode.description: บางเพลงของศิลปินคนนี้อาจยังไม่ได้อยู่ในคลังของคุณ เลือกวิธีที่ต้องการให้ Cider เพิ่มเพลงเหล่านั้นไปยังเพลย์ลิสต์
smartPlaylist.writeMode.title: ต้องการบันทึกเพลงที่จับคู่จากแค็ตตาล็อกอย่างไร?
