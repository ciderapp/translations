smartPlaylist.writeMode.appleSyncFootnote: 'ข้อควรทราบ: เมื่อเปิดตั้งค่า "เพิ่มเพลงในเพลย์ลิสต์ไปยังคลัง" ของ Apple Music (ซึ่งเป็นค่าเริ่มต้นบน iOS, iPadOS, macOS และ Android) เพลงจากแค็ตตาล็อกที่ Cider เพิ่มไปยังเพลย์ลิสต์ในคลังจะไปปรากฏในคลัง "เพลง" บนอุปกรณ์เหล่านั้นด้วย ปิดการตั้งค่าดังกล่าวในแอป Apple Music เพื่อให้เพลงที่จับคู่จากแค็ตตาล็อกแสดงเฉพาะในเพลย์ลิสต์เท่านั้น'
smartPlaylist.writeMode.catalog.subtitle: รวดเร็วกว่า — Cider จะเขียนข้อมูลอ้างอิงแค็ตตาล็อกลงในเพลย์ลิสต์โดยตรง และจะเล่นเพลงจากแค็ตตาล็อกของ Apple Music
