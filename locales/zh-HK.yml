settings.troubleshooting.impressionReporting: PlayActivity 曝光報告
settings.troubleshooting.impressionReporting.warning1: 傳送書架檢視和點按遙測數據至 xp.apple.com/report/2/xp_its_music_main，與 music.apple.com 網頁播放器傳送的數據一致。這能讓 Apple 的推薦引擎將播放次數歸因於產生該播放的特定推薦項目——這與我們的 PlayActivity reco-data 欄位數據相同，但同時也來自循環中的曝光端。
settings.troubleshooting.impressionReporting.warning2: 這是除了 Cider 已傳送的 PlayActivity 串流之外，真正向 Apple 傳送的傳出遙測數據。只有在你希望獲得與 music.apple.com 完全一致的個人化體驗時才啟用。
