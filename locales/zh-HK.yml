oobe.amupsell.promoExplained: 部分推廣期及非美國的 Apple Music 試用訂閱無法存取 Cider 運作所需的 Apple Music Web Player API。如要驗證你目前的試用訂閱是否支援 Cider，請前往 <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a> 登入並嘗試播放音樂。如果可以正常播放，那就太好了！你已準備好使用 Cider。如果無法播放，請考慮在此訂閱 Apple Music：<a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>
oobe.amupsell.subscribeBtn: 訂閱 Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider 需要有效且已付費的 Apple Music 訂閱。
  Cider 無法配合 Apple Music 聲控方案或部分推廣期試用訂閱使用。如果你已擁有符合資格的 Apple Music 訂閱，請按「下一步」繼續。
oobe.amupsell.title: 開始之前
