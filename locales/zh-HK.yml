oobe.audio.advancedFunctionality: ""
oobe.audio.subtitle: ""
oobe.audio.text: |-
  Cider 配備自訂調音和設計的音訊架構，帶來豐富且高品質的音訊體驗。
  當中包括 Cider Adrenaline、Atmosphere Realizer 和 Spatialized Audio。
  如要啟用此功能，必須開啟「進階音訊功能」（Advanced Audio Functionality）。
  啟用「進階音訊功能」後，你便可在應用程式設定中的 Cider Audio Labs 存取這些增強功能。
