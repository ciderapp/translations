settings.troubleshooting.logFile.desc: 檢視、複製或清除你的記錄檔
settings.troubleshooting.mkliteDebug: MKLite 除錯記錄
settings.troubleshooting.mkliteDebug.desc: 來自 MKLite 的詳細主控台輸出 — PlayActivity 承載資料 (JSPLAY)、音軌變更和播放狀態。在比較我們傳送給 Apple 的數據與 music.apple.com 時非常有用。正常使用時請保持關閉。
settings.troubleshooting.mkLoadingMethod: MusicKit 載入方式
settings.troubleshooting.mkLoadingMethod.warning1: 變更用於載入 MusicKit 的方式，這用於解決因 MusicKit 更新而產生的潛在載入問題。
settings.troubleshooting.mkLoadingMethod.warning2: 除非你清楚知道自己在做甚麼，或收到相關指示，否則請勿變更此設定。
