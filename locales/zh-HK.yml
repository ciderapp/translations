settings.troubleshooting.hevcWorkaround.desc: 針對部分 GPU 在 WebView2 中播放 10 位元 SDR HEVC 時出現問題的錯誤，套用濾鏡以補償視覺偏移的臨時解決方案。
settings.troubleshooting.impressionReporting: PlayActivity 曝光回報
settings.troubleshooting.impressionReporting.warning1: 傳送書架檢視和點按遙測數據至 xp.apple.com/report/2/xp_its_music_main，與 music.apple.com 網頁播放器發送的數據一致。這讓 Apple 的推薦引擎能夠將播放歸因於產生該播放的特定推薦項目 — 與我們的 PlayActivity 推薦數據欄位相同，但同時也來自循環中的展示端。
settings.troubleshooting.impressionReporting.warning2: 這是除了 Cider 已傳送的 PlayActivity 串流之外，真正向 Apple 發送的傳出遙測數據。只有在你想與 music.apple.com 獲得完全一致的個人化體驗時才啟用此功能。
