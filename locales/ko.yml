  Cider는 두 가지의 서로 다른 윈도우 레이아웃을 제공합니다.
  Maverick은 윈도우 상단에 플레이어가 위치하는 iTunes 스타일의 레이아웃입니다.
  Mojave는 Cider Collective가 새롭게 재해석하여 만든 레이아웃입니다.

  레이아웃은 설정에서 언제든지 변경할 수 있습니다.
