oobe.amupsell.promoExplained: 일부 프로모션 및 미국 외 체험 구독은 Cider이 기능하기 위해 필요한 Apple Music Web Player API에 접근할 수 없는 경우가 있습니다. 활성 체험 구독이 Cider을 사용할 수 있는 지 확인하기 위하여, <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>에서 로그인한 후 노래를 재생해보세요. 만약 작동한다면, 축하합니다! Cider을 사용할 수 있습니다. 만약 작동하지 않는다면, <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>에서 Apple Music을 구독하는 것을 고려해보세요.
