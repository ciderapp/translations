oobe.amupsell.explainBtn: 설명
oobe.amupsell.promoExplained: "일부 프로모션 및 미국 외 지역의 Apple Music 체험 구독은 Cider 작동에 필요한 Apple Music 웹 플레이어 API에 접근할 수 없습니다. 현재 이용 중인 체험 구독이 Cider에서 작동하는지 확인하려면 <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>에 접속하여 로그인한 후 음악을 재생해 보세요. 정상적으로 재생된다면 Cider를 사용할 준비가 완료된 것입니다! 만약 재생되지 않는다면 여기에서 Apple Music 구독을 고려해 보세요: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Apple Music 구독하기
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider를 사용하려면 활성화된 유료 Apple Music 구독이 필요합니다.
  Cider는 Apple Music Voice 요금제 또는 일부 프로모션 체험 구독에서는 작동하지 않습니다. 조건에 맞는 Apple Music 구독을 이미 보유하고 계시다면 '다음'을 클릭하여 계속 진행하세요.
oobe.amupsell.title: 시작하기 전에
oobe.appearance.accentHint: 앱 전반의 버튼, 강조 표시, 진행률 표시줄 등에 사용됩니다. 하나를 선택해 실시간 미리보기로 확인해 보세요.
