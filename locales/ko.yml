settings.troubleshooting.impressionReporting.warning1: music.apple.com의 웹 플레이어가 전송하는 것과 동일하게 선반 보기 및 클릭 원격 측정 데이터를 xp.apple.com/report/2/xp_its_music_main으로 전송합니다. 이를 통해 Apple의 추천 엔진이 재생 횟수를 해당 재생을 유도한 특정 추천의 결과로 귀속시킬 수 있습니다. 이는 PlayActivity 추천 데이터 필드와 동일한 데이터이지만, 루프의 노출 측면에서도 제공됩니다.
settings.troubleshooting.impressionReporting.warning2: 이는 Cider가 이미 전송하는 PlayActivity 스트림 외에 Apple로 전송되는 실제 아웃바운드 원격 측정 데이터입니다. music.apple.com과 완전히 동일한 개인화 수준을 원할 때만 활성화하십시오.
