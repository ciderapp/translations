oobe.amupsell.amWebUrl: https://beta.music.apple.com/
oobe.amupsell.explainBtn: 설명
oobe.amupsell.promoExplained: 일부 프로모션 및 미국 외 체험 구독은 Cider이 기능하기 위해 필요한 Apple Music Web Player API에 접근할 수 없는 경우가 있습니다. 활성 체험 구독이 Cider을 사용할 수 있는 지 확인하기 위하여, <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>에서 로그인한 후 노래를 재생해보세요. 만약 작동한다면, 축하합니다! Cider을 사용할 수 있습니다. 만약 작동하지 않는다면, <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>에서 Apple Music을 구독하는 것을 고려해보세요.
oobe.amupsell.subscribeBtn: Apple Music 구독하기
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider는 활성 상태의 유료 Apple Music 구독이 필요합니다.
  Cider는 Apple Music Voice 플랜 및 몇몇 체험 구독으로 작동하지 않습니다. 이미 제대로 된 Apple Music 구독이 있다면, 다음을 눌러 계속하세요.
oobe.amupsell.title: 시작하기 전에
oobe.audio.text: |-
  Cider에는 고품질의 오디오를 제공하기 위해 디자인된 오디오 스택 기능이 있습니다.
  Cider Adrenaline, Atmosphere Realizer, 및 공간화 오디오가 있습니다.
  이 기능을 활성화하기 위해 "고급 오디오 기능"이 활성화되어있어야 합니다.
  고급 오디오 기능을 활성화하면 앱 설정의 Cider Audio Labs에 있는 이러한 강화 기능들을 사용할 수 있습니다.
oobe.audio.title: 오디오
oobe.done: 완료
oobe.general.title: 일반
oobe.intro.text: Cider을 사용하기 위해 약간의 설정을 변경해주세요. 언제든지 설정에서 다시 변경할 수 있습니다.
oobe.intro.title: Cider에 오신 것을 환영합니다
oobe.next: 다음
oobe.no: 아니오
oobe.previous: 이전
oobe.visual.layout.text: |-
  Cider에는 두 개의 창 레이아웃이 있습니다.
  Maverick은 플레이어가 창 위쪽에 있는 iTunes와 같은 레이아웃입니다.
  Mojave는 Cider Collective가 만든 새로운 레이아웃입니다.

  나중에 언제든지 설정에서 변경할 수 있습니다.
