oobe.audio.subtitle: ""
oobe.audio.text: |-
  Cider는 풍부하고 고품질의 오디오 경험을 제공하기 위해 맞춤 튜닝 및 설계된 오디오 스택을 탑재하고 있습니다.
  Cider Adrenaline, Atmosphere Realizer 및 Spatialized Audio 기능이 포함되어 있습니다.
  이 기능을 사용하려면 "고급 오디오 기능"을 활성화해야 합니다.
  고급 오디오 기능을 활성화하면 앱 설정의 Cider Audio Labs에서 이러한 향상된 기능들을 사용할 수 있습니다.
