settings.troubleshooting.impressionReporting.warning1: "Envía telemetría de clics y vistas de secciones a xp.apple.com/report/2/xp_its_music_main, coincidiendo con lo que emite el reproductor web de music.apple.com. Permite que el motor de recomendaciones de Apple atribuya las reproducciones a la recomendación específica que las generó: los mismos datos que nuestro campo reco-data de PlayActivity, pero provenientes también del lado de las impresiones del bucle."
settings.troubleshooting.impressionReporting.warning2: Esta es telemetría saliente real hacia Apple más allá del flujo de PlayActivity que Cider ya envía. Actívalo solo si quieres una paridad de personalización total con music.apple.com.
