settings.troubleshooting.mkLoadingMethod: Método de carga de MusicKit
settings.troubleshooting.mkLoadingMethod.warning1: Cambia el método utilizado para cargar MusicKit. Se usa para solucionar posibles problemas de carga derivados de las actualizaciones de MusicKit.
settings.troubleshooting.mkLoadingMethod.warning2: Este ajuste NO debe cambiarse a menos que sepas lo que haces o se te haya indicado.
