oobe.amupsell.promoExplained: "Algunas suscripciones de prueba promocionales y no estadounidenses de Apple Music no tienen acceso a las API del reproductor web de Apple Music necesarias para que Cider funcione. Para verificar si tu prueba activa funcionará con Cider, ve a <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, inicia sesión e intenta reproducir música. Si funciona, ¡genial! Ya puedes usar Cider. Si no es así, considera suscribirte a Apple Music aquí: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
