settings.troubleshooting.hevcWorkaround.desc: Solución alternativa para un error en WebView2 con algunas GPU que tienen problemas con la reproducción de HEVC SDR de 10 bits, aplicando un filtro para compensar el cambio visual.
settings.troubleshooting.impressionReporting: Informe de impresiones de PlayActivity
settings.troubleshooting.impressionReporting.warning1: Envía telemetría de clics y vistas de estantería a xp.apple.com/report/2/xp_its_music_main, coincidiendo con lo que emite el reproductor web de music.apple.com. Permite que el motor de recomendaciones de Apple atribuya las reproducciones a la recomendación específica que las produjo (los mismos datos que nuestro campo reco-data de PlayActivity, pero proviniendo también del lado de la impresión del bucle).
settings.troubleshooting.impressionReporting.warning2: Esta es telemetría saliente real hacia Apple más allá del flujo de PlayActivity que Cider ya envía. Actívalo solo si deseas una paridad de personalización completa con music.apple.com.
