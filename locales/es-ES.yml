oobe.audio.text: |-
  Cider cuenta con un motor de audio personalizado y diseñado a medida que ofrece una experiencia de sonido rica y de alta calidad.
  Incluye Cider Adrenaline, Atmosphere Realizer y Spatialized Audio.
  Para activar esta característica, se debe habilitar la "Función de audio avanzada".
  Al habilitar la Función de audio avanzada, tendrás acceso a estas mejoras en Cider Audio Labs, que se encuentra en los ajustes de la aplicación.
