oobe.amupsell.text: |-
  Cider requiere una suscripción activa y de pago a Apple Music.
  Cider no funcionará con el plan Apple Music Voice ni con algunas suscripciones de prueba promocionales. Si ya tienes una suscripción válida a Apple Music, haz clic en Siguiente para continuar.
