settings.troubleshooting.bgDiagnostics: Diagnóstico de reproducción en segundo plano
settings.troubleshooting.bgDiagnostics.desc: Registros adicionales para diagnosticar problemas de reproducción cuando la ventana está minimizada o en segundo plano (quién pausó el reproductor, problemas con el temporizador y suspensiones del sistema operativo). Actívalo al informar de un error de reproducción en segundo plano.
