oobe.amupsell.explainBtn: Vysvětlit
oobe.amupsell.promoExplained: "Některá propagační a neamerická zkušební předplatná Apple Music nemají přístup k rozhraním Apple Music Web Player API, která Cider vyžaduje ke svému fungování. Chcete-li ověřit, zda bude vaše aktivní zkušební verze se službou Cider fungovat, přejděte na <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, přihlaste se a zkuste přehrát hudbu. Pokud to funguje, skvělé! Jste připraveni používat Cider. Pokud ne, zvažte předplatné Apple Music zde: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Předplatit si Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider vyžaduje aktivní, placené předplatné Apple Music.
  Cider nebude fungovat s tarifem Apple Music Voice ani s některými propagačními zkušebními předplatnými. Pokud již máte vyhovující předplatné Apple Music, pokračujte kliknutím na Další.
oobe.amupsell.title: Než začneme
oobe.appearance.accentHint: Používá se pro tlačítka, zvýraznění a indikátory průběhu v celé aplikaci. Vyzkoušejte si ho, náhled se zobrazuje okamžitě.
