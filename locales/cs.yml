settings.troubleshooting.mkliteDebug.desc: Podrobný výstup konzole z MKLite – data PlayActivity (JSPLAY), změny skladeb a stav přehrávání. Užitečné při porovnávání toho, co odesíláme Applu, s webem music.apple.com. Pro běžné použití nechte vypnuté.
settings.troubleshooting.mkLoadingMethod: Metoda načítání MusicKit
settings.troubleshooting.mkLoadingMethod.warning1: Změňte metodu používanou k načítání MusicKit. Slouží k řešení potenciálních problémů s načítáním po aktualizacích MusicKit.
