settings.troubleshooting.hevcWorkaround: Řešení pro HEVC
settings.troubleshooting.hevcWorkaround.desc: Řešení chyby ve WebView2 u některých grafických karet, které mají problémy s přehráváním 10bitového SDR HEVC, aplikováním filtru pro kompenzaci vizuálního posunu.
settings.troubleshooting.impressionReporting: Hlášení zobrazení PlayActivity
settings.troubleshooting.impressionReporting.warning1: Odesílá telemetrii zobrazení sekcí a kliknutí na adresu xp.apple.com/report/2/xp_its_music_main, což odpovídá tomu, co vysílá webový přehrávač music.apple.com. Umožňuje doporučovacímu systému Apple přiřadit přehrání konkrétnímu doporučení, které je vyvolalo – jde o stejná data jako v našem poli reco-data v PlayActivity, ale pocházející také ze strany zobrazení.
settings.troubleshooting.impressionReporting.warning2: Jedná se o skutečnou odchozí telemetrii odesílanou společnosti Apple nad rámec streamu PlayActivity, který Cider již odesílá. Povolte pouze v případě, že chcete plnou paritu personalizace s webem music.apple.com.
