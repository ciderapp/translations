oobe.audio.subtitle: ""
oobe.audio.text: |-
  Cider obsahuje na míru vyladěný a navržený zvukový subsystém, který poskytuje bohatý a vysoce kvalitní zvukový zážitek.
  Nabízí funkce Cider Adrenaline, Atmosphere Realizer a Spatialized Audio.
  Chcete-li tyto funkce využívat, musíte zapnout volbu „Pokročilé zvukové funkce“.
  Zapnutím pokročilých zvukových funkcí získáte přístup k těmto vylepšením v sekci Cider Audio Labs v nastavení aplikace.
