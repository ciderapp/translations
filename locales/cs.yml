oobe.amupsell.amWebUrl: https://beta.music.apple.com/
oobe.amupsell.explainBtn: Vysvětlení
oobe.amupsell.promoExplained: "Některé propagační a neamerické testovací předplatné Apple Music nemají přístup k požadovanému Apple Music Web Player API, který je potřebný pro funkci Cider. Chcete-li ověřit, zda vaše aktivní zkušební verze bude fungovat s Cider, přejděte do <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a> se přihlásit a pokusit se hrát nějakou hudbu. Pokud to funguje! Jste připraveni použít Cider, ale pokud nezvažujete přihlášení k odběru Apple Music zde: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Odebírat Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider vyžaduje aktivní, placenou Apple Music předplatné
  Cider nebude pracovat s Apple Music Voice Plan nebo s některými propagačními testovacími předplatiteli. Pokud již máte kvalifikovaný Apple Music předplatné klikněte Další pro pokračování.
oobe.amupsell.title: Než začneme
oobe.audio.text: |-
  Cider nabízí vlastní upravený a navržený zvukový zásobník, který poskytuje bohatý zážitek z vysoce kvalitního zvuku.
  Vytváří Cider Adrenaline, Atmosphere Realizér a Spatialized Audio.
  Chcete-li povolit tuto funkci "Rozšířená funkce zvuku" musí být povolena.
  Povolení pokročilé funkce zvuku vám umožní přístup k těmto vylepšením v zvukových laboratořích Cider, které se nacházejí v nastavení aplikace.
oobe.audio.title: Zvuk
oobe.done: Hotovo
oobe.general.title: Obecná ustanovení
oobe.intro.text: Pojďme si nastavit několik věcí, abyste mohli používat Cider, jak se vám líbí. Toto nastavení můžete později změnit.
oobe.intro.title: Vítejte v Cider
oobe.next: Další
oobe.no: Ne
oobe.previous: Předchozí
oobe.visual.layout.text: |-
  Cider má dva okno různé rozložení.
  Maverick je iTunes jako rozložení s přehrávačem v horní části okna.
  Mojave je nový spin vytvořený Cider Collective.

  Můžete změnit rozvržení kdykoliv v nastavení.
