settings.troubleshooting.impressionReporting.warning1: Odesílá telemetrii zobrazení sekcí a kliknutí na adresu xp.apple.com/report/2/xp_its_music_main, což odpovídá chování webového přehrávače music.apple.com. Umožňuje doporučovacímu systému Apple přiřadit přehrání ke konkrétnímu doporučení, které je vyvolalo – jde o stejná data jako v našem poli reco-data v PlayActivity, ale přicházející také ze strany zobrazení.
settings.troubleshooting.impressionReporting.warning2: Jedná se o skutečnou odchozí telemetrii odesílanou společnosti Apple nad rámec streamu PlayActivity, který Cider již odesílá. Zapněte pouze v případě, že chcete plnou shodu personalizace s music.apple.com.
