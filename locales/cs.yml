settings.troubleshooting.bgDiagnostics.desc: Dodatečné záznamy v protokolu pro diagnostiku problémů s přehráváním, když je okno minimalizované nebo neaktivní – kdo pozastavil přehrávač, výpadky časovače a pozastavení operačním systémem. Zapněte při hlášení chyb přehrávání na pozadí.
