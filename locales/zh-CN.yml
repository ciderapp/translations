oobe.amupsell.promoExplained: Cider 无法获取部分促销活动与非美区 Apple Muisc 试用状态下的网络播放器API。 要验证您的试用订阅是否能够在 Cider 内使用, 点击<a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, 登陆后尝试播放音乐。如果能够播放，你就可以使用 Cider 了！否则请考虑订阅 Apple Music 服务： <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>。
oobe.amupsell.subscribeBtn: 订阅 Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  使用 Cider 需要付费的 Apple Music 订阅。
  Cider 不能在 Apple Music Voice 计划或某些促销试用订阅状态下使用。 如果您已经订阅 Apple Music，请点击下一步继续。
oobe.amupsell.title: 在我们开始之前
oobe.audio.advancedFunctionality: ""
oobe.audio.subtitle: ""
oobe.audio.text: |-
  Cider 能够自定义调整和设置的音频属性以提供丰富的高品质音频体验。
  这些功能包括 Cider 数码增强音频处理器，氛围实现器和空间音频。
  要启用这些功能，必须先启用 "高级音频功能"。
  启用高级音频功能后，你便可以使用位于应用设置中的 Cider 音频实验室里的这些增强功能了。
