settings.troubleshooting.impressionReporting.warning1: 向 xp.apple.com/report/2/xp_its_music_main 发送书架视图和点击遥测数据，与 music.apple.com 网页播放器发送的数据一致。这能让 Apple 的推荐引擎将播放归因于产生它们的特定推荐——这与我们的 PlayActivity 推荐数据字段相同，但同时也来自循环的曝光端。
settings.troubleshooting.impressionReporting.warning2: 这是除 Cider 已发送的 PlayActivity 流之外，向 Apple 发送的真实外发遥测数据。仅在您希望获得与 music.apple.com 完全一致的个性化体验时启用。
