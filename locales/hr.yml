  Cider nudi dva različita izgleda prozora.
  Maverick je izgled sličan iTunesu s reproduktorom na vrhu prozora.
  Mojave je novi dizajn koji je kreirao Cider Collective.

  Izgled možete promijeniti u bilo kojem trenutku u postavkama.
