oobe.amupsell.explainBtn: Objasni
oobe.amupsell.promoExplained: "Neke promotivne i probne pretplate na Apple Music izvan SAD-a nemaju pristup potrebnim API-jima za Apple Music Web Player koji su potrebni za rad aplikacije Cider. Kako biste provjerili hoće li vaša aktivna probna pretplata raditi s aplikacijom Cider, idite na <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, prijavite se i pokušajte reproducirati glazbu. Ako radi, super! Spremni ste za korištenje aplikacije Cider, no ako ne radi, razmislite o pretplati na Apple Music ovdje: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Pretplatite se na Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider zahtijeva aktivnu, plaćenu pretplatu na Apple Music
  Cider neće raditi s pretplatom Apple Music Voice Plan ili nekim promotivnim probnim pretplatama. Ako već imate odgovarajuću pretplatu na Apple Music, kliknite Dalje za nastavak.
oobe.amupsell.title: Prije nego što počnemo
oobe.audio.advancedFunctionality: ""
oobe.audio.subtitle: ""
oobe.audio.text: |-
  Cider sadrži prilagođeni i dizajnirani audio sustav koji pruža bogato audio iskustvo visoke kvalitete.
  Uključuje značajke Cider Adrenaline, Atmosphere Realizer i Spatialized Audio.
  Za omogućavanje ove funkcionalnosti mora biti uključena opcija "Napredna audio funkcionalnost".
  Omogućavanje napredne audio funkcionalnosti pružit će vam pristup ovim poboljšanjima u odjeljku Cider Audio Labs, koji se nalazi u postavkama aplikacije.
