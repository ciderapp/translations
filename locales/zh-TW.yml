oobe.amupsell.amWebUrl: https://beta.music.apple.com/
oobe.amupsell.explainBtn: 這是什麼？
oobe.amupsell.promoExplained: "Cider 可能無法取得部分促銷活動與非美區 Apple Muisc 試用狀態下的網路播放器 API，要驗證您的試用訂閱是否能夠在 Cider 內使用，點擊<a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>，登入後試試播放音樂。如果能够播放，你就可以使用 Cider 了！否則請考慮訂閱 Apple Music 服務: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>。"
oobe.amupsell.subscribeBtn: 訂閱 Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  使用 Cider 需要付費訂閱 Apple Music 服務。 
  Cider 不能在「Apple Music 聲控」方案或部分優惠試用訂閱狀態下使用。如果你已經訂閱 Apple Music，請點擊下一步繼續。
oobe.amupsell.title: 在我們開始之前
oobe.audio.text: Cider 能夠自訂調整和設定的音訊屬性，提供豐富的高品質音訊體驗，包括 Cider 數位增強音訊處理™️，臨場音效和空間音訊。要使用這些功能，必須開啟「音訊實驗室」功能。
oobe.audio.title: 音訊設定
oobe.done: 完成
oobe.general.title: 一般設定
oobe.intro.text: 為了按照你喜愛的方式來使用 Cider 應用程式，請先完成一些設定。您之後可以隨時變更這些設定。
oobe.intro.title: 歡迎使用 Cider
oobe.next: 下一步
oobe.no: 不
oobe.previous: 上一步
oobe.visual.layout.text: |-
  Cider 提供了兩種不同的視窗風格。
  「Maverick」是一個類似 iTunes 的風格，播放器在視窗的頂部。
   「Mojave」是由 Cider 團隊設計的一種新布局風格。

  您可以在設定中隨時改變風格。
