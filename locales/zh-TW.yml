settings.troubleshooting.hevcWorkaround: HEVC 因應措施
settings.troubleshooting.hevcWorkaround.desc: 針對部分 GPU 在 WebView2 中播放 10 位元 SDR HEVC 時發生問題的 Bug，套用濾鏡以補償視覺偏移的因應措施。
settings.troubleshooting.impressionReporting: PlayActivity 曝光回報
settings.troubleshooting.impressionReporting.warning1: 傳送展示架檢視與點擊遙測資料至 xp.apple.com/report/2/xp_its_music_main，與 music.apple.com 網頁播放器傳送的內容一致。這能讓 Apple 的推薦引擎將播放次數歸因於產生該播放的特定推薦項目——這與我們 PlayActivity 的 reco-data 欄位資料相同，但同時也來自循環中的曝光端。
settings.troubleshooting.impressionReporting.warning2: 這是除了 Cider 已傳送的 PlayActivity 串流之外，真正向 Apple 傳送的外部遙測資料。只有在您希望獲得與 music.apple.com 完全一致的個人化體驗時，才啟用此功能。
settings.troubleshooting.logFile: 記錄檔
settings.troubleshooting.logFile.actions: 記錄檔操作
settings.troubleshooting.logFile.desc: 檢視、複製或清除您的記錄檔
settings.troubleshooting.mkliteDebug: MKLite 偵錯記錄
settings.troubleshooting.mkliteDebug.desc: 來自 MKLite 的詳細主控台輸出——包含 PlayActivity 承載資料 (JSPLAY)、曲目變更和播放狀態。在將我們傳送給 Apple 的內容與 music.apple.com 進行比較時非常有用。正常使用時請保持關閉。
settings.troubleshooting.mkLoadingMethod: MusicKit 載入方式
settings.troubleshooting.mkLoadingMethod.warning1: 變更用於載入 MusicKit 的方式，這可用於解決因 MusicKit 更新而導致的潛在載入問題。
