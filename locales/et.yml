oobe.audio.subtitle: ""
oobe.audio.text: |-
  Cider sisaldab spetsiaalselt häälestatud ja loodud helisüsteemi, mis pakub rikkalikku ja kvaliteetset helikogemust.
  Selle hulka kuuluvad Cider Adrenaline, Atmosphere Realizer ja Spatialized Audio.
  Selle funktsionaalsuse kasutamiseks peab olema sisse lülitatud "Täpsem helifunktsionaalsus".
  Täpsema helifunktsionaalsuse lubamine annab sulle juurdepääsu neile täiustustele Cider Audio Labs jaotises, mille leiad rakenduse seadetest.
