oobe.amupsell.promoExplained: "Mõnel kampaaniapõhisel ja väljaspool USA-d asuval Apple Music proovitellimusel puudub juurdepääs vajalikele Apple Music veebipleieri API-dele, mida Cider vajab töötamiseks. Kontrollimaks, kas sinu aktiivne proovitellimus töötab Cideriga, mine aadressile <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, logi sisse ja proovi muusikat esitada. Kui see töötab, suurepärane! Oled valmis Ciderit kasutama. Kui see aga ei tööta, kaalu Apple Music tellimist siit: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Telli Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider vajab töötamiseks aktiivset tasulist Apple Music tellimust.
  Cider ei tööta Apple Music Voice Plan paketiga ega mõningate kampaaniapõhiste proovitellimustega. Kui sul on juba sobiv Apple Music tellimus, klõpsa jätkamiseks Edasi.
oobe.amupsell.title: Enne alustamist
oobe.appearance.accentHint: Kasutatakse nuppude, esiletõstmiste ja edenemisribade jaoks kogu rakenduses. Proovi mõnda, eelvaade on reaalajas.
