settings.troubleshooting.bgDiagnostics.desc: Registos adicionais para diagnosticar problemas de reprodução enquanto a janela está minimizada ou sem foco — quem pausou o leitor, falhas de temporizador e suspensões do SO. Ative ao reportar um erro de reprodução em segundo plano.
