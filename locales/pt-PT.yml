oobe.amupsell.promoExplained: "Algumas subscrições promocionais e de avaliação do Apple Music (fora dos EUA) não têm acesso às APIs do Apple Music Web Player necessárias para o funcionamento do Cider. Para verificar se o seu período de avaliação ativo funciona com o Cider, aceda a <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, inicie sessão e tente reproduzir música. Se funcionar, excelente! Está pronto para usar o Cider. Caso contrário, considere subscrever o Apple Music aqui: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Subscrever o Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  O Cider requer uma subscrição ativa e paga do Apple Music.
  O Cider não funciona com o Apple Music Voice Plan ou com algumas subscrições promocionais de avaliação. Se já tem uma subscrição elegível do Apple Music, clique em Seguinte para continuar.
