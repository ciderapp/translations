oobe.audio.text: |-
  O Cider possui uma arquitetura de áudio personalizada e concebida para proporcionar uma experiência de áudio rica e de alta qualidade.
  Inclui o Cider Adrenaline, o Atmosphere Realizer e Áudio Espacializado.
  Para ativar esta funcionalidade, a "Funcionalidade de Áudio Avançada" deve estar ativada.
  Ao ativar a Funcionalidade de Áudio Avançada, terá acesso a estas melhorias no Cider Audio Labs, que se encontra nas definições da aplicação.
