oobe.amupsell.explainBtn: Explicação
oobe.amupsell.promoExplained: "Algumas subscrições promocionais e experimentais não-EUA da Apple Music não têm acesso às API's da Apple Music Web Player necessárias para o funcionamento da Cider.  Para verificar se a sua versão experimental ativa irá funcionar com o Cider, vá a <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a> iniciar sessão e tente reproduzir alguma música.  Se funcionar, óptimo! Está pronto a usar o Cider, no entanto, se não considerar subscrever a Apple Music aqui: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Subscrever a Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  O Cider requer uma subscrição ativa e paga da Apple Music
  ´O Cider não funcionará com o Apple Music Voice Plan ou algumas subscrições promocionais experimentais.  Se já tem uma subscrição Apple Music qualificada, clique em Seguinte para continuar.
oobe.amupsell.title: Antes de iniciar
oobe.audio.text: |-
  O Cider dispõe de um conjunto personalizado de áudio sintonizado e desenhado que proporciona uma rica experiência áudio de alta qualidade.
  Apresentando o Cider Adrenalina, Realizador de Atmosfera, e Áudio Espacializado.
  Para ativar esta funcionalidade a "Funcionalidade de áudio avançada" deve ser ativada.
  A ativação da funcionalidade de áudio avançada dar-lhe-á acesso a estes melhoramentos no Cider Audio Lab, encontrados nas definições da aplicação.
