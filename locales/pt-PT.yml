settings.troubleshooting.logFile.desc: Ver, copiar ou limpar o seu ficheiro de registo
settings.troubleshooting.mkliteDebug: Registo de depuração do MKLite
settings.troubleshooting.mkliteDebug.desc: Saída detalhada da consola do MKLite — payloads de PlayActivity (JSPLAY), alterações de faixas e estado da reprodução. Útil para comparar o que enviamos para a Apple com o music.apple.com. Desative para uma utilização normal.
settings.troubleshooting.mkLoadingMethod: Método de Carregamento do MusicKit
settings.troubleshooting.mkLoadingMethod.warning1: Altere o método utilizado para carregar o MusicKit; isto serve para resolver potenciais problemas de carregamento decorrentes de atualizações do MusicKit.
settings.troubleshooting.mkLoadingMethod.warning2: Esta definição NÃO deve ser alterada a menos que saiba o que está a fazer ou tenha recebido instruções para o fazer.
settings.troubleshooting.mkLoadingMethod.warning3: Esta opção não se destina a resolver problemas gerais de ligação ou reprodução.
