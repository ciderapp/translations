settings.troubleshooting.impressionReporting: Relatório de impressões do PlayActivity
settings.troubleshooting.impressionReporting.warning1: Envia telemetria de visualização de prateleira e cliques para xp.apple.com/report/2/xp_its_music_main, correspondendo ao que o leitor web do music.apple.com emite. Permite que o motor de recomendações da Apple atribua as reproduções à recomendação específica que as gerou — os mesmos dados que o nosso campo reco-data do PlayActivity, mas vindo também do lado das impressões do ciclo.
settings.troubleshooting.impressionReporting.warning2: Esta é uma telemetria de saída genuína para a Apple, além do fluxo do PlayActivity que o Cider já envia. Ative apenas se pretender uma paridade total de personalização com o music.apple.com.
