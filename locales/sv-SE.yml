oobe.amupsell.promoExplained: "Vissa PR-prenumerationer och icke-amerikanska Apple Music testabonnemang har inte tillgång till de nödvändiga Apple Music Web Player API:er som behövs för att Cider ska fungera. För att verifiera om din aktiva provperiod kommer att fungera med Cider gå till <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a> logga in och försök spela upp musik. Om det fungerar, bra! Du är redo att använda Cider, men om det inte överväger att prenumerera på Apple Music här: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
