oobe.amupsell.explainBtn: Förklara
oobe.amupsell.promoExplained: "Vissa PR-prenumerationer och icke-amerikanska Apple Music testabonnemang har inte tillgång till de nödvändiga Apple Music Web Player API:er som behövs för att Cider ska fungera. För att verifiera om din aktiva provperiod kommer att fungera med Cider gå till <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a> logga in och försök spela upp musik. Om det fungerar, bra! Du är redo att använda Cider, men om det inte överväger att prenumerera på Apple Music här: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Prenumerera på Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider kräver en aktiv, betald Apple Music prenumeration
  Cider kommer inte att fungera med Apple Music Röstplan eller vissa PR-prenumerationer. Om du redan har ett kvalificerat Apple Music-abonnemang klickar du Nästa för att fortsätta.
oobe.amupsell.title: Innan vi börjar
oobe.audio.text: |-
  Cider har en skräddarsydd och utformad ljudstack som ger en rik högkvalitativ ljudupplevelse.
  Med Cider Adrenalin, Atmosfär Realizer och Spatialized Audio.
  För att aktivera denna funktionalitet måste "Avancerad ljudfunktionalitet" vara aktiverad.
  Aktivering av avancerad ljudfunktionalitet ger dig tillgång till dessa förbättringar i Cider Audio Labs, som finns i appinställningarna.
