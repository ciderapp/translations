oobe.audio.text: |-
  Cider har en specialanpassad och designad ljudstack som levererar en fyllig ljudupplevelse av hög kvalitet.
  Innehåller Cider Adrenaline, Atmosphere Realizer och rumsligt ljud.
  För att aktivera denna funktion måste "Avancerad ljudfunktionalitet" vara aktiverad.
  Genom att aktivera avancerad ljudfunktionalitet får du tillgång till dessa förbättringar i Cider Audio Labs, som du hittar i appinställningarna.
