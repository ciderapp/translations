settings.troubleshooting.mkliteDebug.desc: Подробный вывод консоли MKLite — данные PlayActivity (JSPLAY), смена треков и состояние воспроизведения. Полезно для сравнения отправляемых в Apple данных с music.apple.com. Отключите при обычном использовании.
