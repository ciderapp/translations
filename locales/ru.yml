oobe.amupsell.promoExplained:
  value: "Некоторые рекламные и пробные подписки на Apple Music за пределами США не имеют доступа к необходимым API-интерфейсам Apple Music Web Player, необходимым для работы Cider. Чтобы проверить, будет ли ваша действующая пробная версия работать с Cider, перейдите на страницу <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, войдите в систему и попробуйте включить музыку. Если всё работает, то замечательно! Вы готовы к использованию Cider. Если же нет, рассмотрите возможность подписки на Apple Music по этой ссылке: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
  source: human
  by: "@kinlay0"
  issue: 13
oobe.amupsell.subscribeBtn:
  value: Подписаться на Apple Music
  source: human
  by: "@kinlay0"
  issue: 36
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Для Cider требуется действующая платная подписка на Apple Music
  Cider не будет работать с тарифным планом Apple Music Voice или некоторыми рекламными пробными подписками. Если у вас уже есть соответствующая подписка Apple Music, нажмите «Далее», чтобы продолжить.
oobe.amupsell.title: Прежде чем мы начнем
oobe.audio.advancedFunctionality: ""
oobe.audio.subtitle: ""
oobe.audio.text: |-
  В Cider используется специально настроенный и разработанный звуковой стек, который обеспечивает богатое высококачественное звучание.
  Включая Cider Adrenaline, Atmosphere Realizer и Spatialized Audio.
  Для включения этой функции необходимо включить "Расширенные функции звука".
  Включение расширенного звука Функциональность даст вам доступ к этим улучшениям в Cider Audio Labs, которые можно найти в настройках приложения.
