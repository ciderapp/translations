oobe.audio.text: |-
  Cider оснащен специально настроенным аудиодвижком, который обеспечивает богатое и высококачественное звучание.
  Он включает в себя технологии Cider Adrenaline, Atmosphere Realizer и Spatialized Audio.
  Чтобы использовать эти возможности, необходимо включить функцию «Advanced Audio Functionality».
  Включение этой функции откроет вам доступ к улучшениям в Cider Audio Labs, которые можно найти в настройках приложения.
