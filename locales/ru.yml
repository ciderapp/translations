settings.troubleshooting.impressionReporting: Отчеты о показах PlayActivity
settings.troubleshooting.impressionReporting.warning1: Отправляет телеметрию просмотров разделов и кликов на xp.apple.com/report/2/xp_its_music_main, аналогично веб-плееру music.apple.com. Позволяет рекомендательной системе Apple связывать воспроизведения с конкретными рекомендациями, которые их вызвали — те же данные, что и в поле reco-data нашей PlayActivity, но также поступающие со стороны показов.
settings.troubleshooting.impressionReporting.warning2: Это реальная исходящая телеметрия в Apple помимо потока PlayActivity, который Cider уже отправляет. Включайте только в том случае, если хотите добиться полного соответствия персонализации с music.apple.com.
