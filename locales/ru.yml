  value: "Некоторые промо-подписки и пробные подписки Apple Music за пределами США не имеют доступа к API веб-плеера Apple Music, необходимому для работы Cider. Чтобы проверить, будет ли ваша пробная подписка работать с Cider, перейдите по ссылке <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, войдите в систему и попробуйте включить музыку. Если все работает — отлично! Вы готовы к использованию Cider. Если нет, вы можете оформить подписку на Apple Music здесь: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
