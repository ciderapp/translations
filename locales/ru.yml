settings.troubleshooting.hevcWorkaround.desc: Обходной путь для ошибки в WebView2 на некоторых видеокартах, вызывающей проблемы с воспроизведением 10-битного SDR HEVC. Применяет фильтр для компенсации искажения изображения.
settings.troubleshooting.impressionReporting: Отчеты о показах PlayActivity
settings.troubleshooting.impressionReporting.warning1: Отправляет телеметрию просмотров разделов и кликов на xp.apple.com/report/2/xp_its_music_main, аналогично веб-плееру music.apple.com. Позволяет рекомендательной системе Apple свявать воспроизведения с конкретными рекомендациями, которые их вызвали — те же данные, что и в поле reco-data нашей PlayActivity, но также поступающие со стороны показов.
settings.troubleshooting.impressionReporting.warning2: Это реальная исходящая телеметрия в Apple помимо потока PlayActivity, который Cider уже отправляет. Включайте только в том случае, если хотите полного соответствия персонализации с music.apple.com.
