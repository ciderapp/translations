oobe.amupsell.text: |-
  Для работы Cider требуется активная платная подписка Apple Music.
  Cider не поддерживает тарифный план Apple Music Voice Plan и некоторые промо-подписки. Если у вас уже есть подходящая подписка Apple Music, нажмите «Далее», чтобы продолжить.
