oobe.audio.text: |-
  Cider, zengin ve yüksek kaliteli bir ses deneyimi sunan, özel olarak ayarlanmış ve tasarlanmış bir ses yığınına sahiptir.
  Cider Adrenaline, Atmosphere Realizer ve Spatialized Audio özelliklerini içerir.
  Bu işlevi etkinleştirmek için "Gelişmiş Ses İşlevselliği" etkinleştirilmelidir.
  Gelişmiş Ses İşlevselliğini etkinleştirmek, uygulama ayarlarında bulunan Cider Audio Labs'deki bu geliştirmelere erişmenizi sağlayacaktır.
