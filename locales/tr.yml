  Cider, aktif ve ücretli bir Apple Music aboneliği gerektirir.
  Cider, Apple Music Voice Planı veya bazı promosyonel deneme abonelikleriyle çalışmaz. Uygun bir Apple Music aboneliğiniz zaten varsa devam etmek için İleri'ye tıklayın.
