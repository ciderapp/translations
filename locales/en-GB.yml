oobe.amupsell.promoExplained: "Some promotional and non US Apple Music trial subscriptions do not have access to the required Apple Music Web Player API's needed for Cider to function.  To verify if your active trial will work with Cider go to <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a> log in and try to play some music.  If it works, great! You're ready to use Cider, however if it does not consider subscribing to Apple Music here: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Subscribe to Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider requires an active, paid Apple Music subscription
  Cider will not work with Apple Music Voice Plan or some promotional trial subscriptions.  If you already have a qualified Apple Music subscription click Next to continue.
oobe.amupsell.title: Before we start
oobe.audio.text: |-
  Cider features a custom tuned and designed audio stack that delivers a rich high quality audio experience.
  Featuring Cider Adrenaline, Atmosphere Realiser, and Spatialised Audio.
  To enable this functionality "Advanced Audio Functionality" must be enabled.
  Enabling Advanced Audio Functionality will give you access to these enhancements in the Cider Audio Labs, found in the app settings.
