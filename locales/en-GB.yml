settings.troubleshooting.hevcWorkaround: HEVC Workaround
settings.troubleshooting.hevcWorkaround.desc: Workaround for a bug in WebView2 with some GPUs that have issues with 10-bit SDR HEVC playback by applying a filter to compensate for the visual shift.
settings.troubleshooting.impressionReporting: PlayActivity Impression Reporting
settings.troubleshooting.impressionReporting.warning1: Sends shelf-view and click telemetry to xp.apple.com/report/2/xp_its_music_main, matching what music.apple.com's web player emits. Lets Apple's recommendation engine attribute plays back to the specific recommendation that produced them — same data as our PlayActivity reco-data field, but coming from the impression side of the loop as well.
settings.troubleshooting.impressionReporting.warning2: This is genuine outbound telemetry to Apple beyond the PlayActivity stream Cider already sends. Only enable if you want full personalisation parity with music.apple.com.
