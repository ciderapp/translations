oobe.amupsell.promoExplained: "Một số đăng ký dùng thử Apple Music khuyến mại và ngoài Hoa Kỳ không có quyền truy cập vào các API Apple Music Web Player cần thiết để Cider hoạt động. Để xác minh xem bản dùng thử đang hoạt động của bạn có hoạt động với Cider hay không, hãy truy cập <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, đăng nhập và thử phát nhạc. Nếu hoạt động tốt, tuyệt vời! Bạn đã sẵn sàng sử dụng Cider, tuy nhiên nếu không, hãy cân nhắc đăng ký Apple Music tại đây: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
