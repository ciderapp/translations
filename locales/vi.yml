oobe.amupsell.text: |-
  Cider yêu cầu đăng ký Apple Music trả phí đang hoạt động
  Cider sẽ không hoạt động với Apple Music Voice Plan hoặc một số đăng ký dùng thử khuyến mại. Nếu bạn đã có đăng ký Apple Music đủ điều kiện, hãy nhấp vào Tiếp theo để tiếp tục.
