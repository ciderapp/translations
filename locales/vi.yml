settings.troubleshooting.impressionReporting: Báo cáo lượt hiển thị PlayActivity
settings.troubleshooting.impressionReporting.warning1: Gửi dữ liệu đo lường lượt xem và lượt nhấp đến xp.apple.com/report/2/xp_its_music_main, khớp với những gì trình phát web của music.apple.com phát ra. Cho phép công cụ đề xuất của Apple liên kết lượt phát lại với đề xuất cụ thể đã tạo ra chúng — cùng dữ liệu với trường dữ liệu đề xuất PlayActivity của chúng tôi, nhưng cũng đến từ phía hiển thị của vòng lặp.
settings.troubleshooting.impressionReporting.warning2: Đây là dữ liệu đo lường gửi đi thực tế đến Apple ngoài luồng PlayActivity mà Cider đã gửi. Chỉ bật nếu bạn muốn có sự tương đồng hoàn toàn về cá nhân hóa với music.apple.com.
