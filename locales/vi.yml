settings.troubleshooting.bgDiagnostics.desc: Nhật ký bổ sung để chẩn đoán sự cố phát nhạc khi cửa sổ bị thu nhỏ hoặc không được tập trung — ai đã tạm dừng trình phát, thiếu hụt bộ hẹn giờ và các giai đoạn tạm ngưng của hệ điều hành. Hãy bật khi báo cáo lỗi phát trong nền.
