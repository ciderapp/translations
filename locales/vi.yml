oobe.audio.text: |-
  Cider sở hữu hệ thống âm thanh được thiết kế và tinh chỉnh riêng, mang lại trải nghiệm âm thanh chất lượng cao, phong phú.
  Bao gồm Cider Adrenaline, Atmosphere Realizer và Spatialized Audio.
  Để kích hoạt tính năng này, "Tính năng âm thanh nâng cao" phải được bật.
  Bật Tính năng âm thanh nâng cao sẽ cho phép bạn truy cập các cải tiến này trong Cider Audio Labs, có thể tìm thấy trong cài đặt ứng dụng.
