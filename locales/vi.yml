settings.troubleshooting.hevcWorkaround.desc: Giải pháp khắc phục lỗi trong WebView2 với một số GPU gặp sự cố khi phát HEVC SDR 10-bit bằng cách áp dụng bộ lọc để bù đắp cho sự thay đổi hình ảnh.
settings.troubleshooting.impressionReporting: Báo cáo lượt hiển thị PlayActivity
settings.troubleshooting.impressionReporting.warning1: Gửi dữ liệu đo lường lượt xem kệ và lượt nhấp đến xp.apple.com/report/2/xp_its_music_main, khớp với dữ liệu từ trình phát web của music.apple.com. Cho phép công cụ đề xuất của Apple liên kết lượt phát với đề xuất cụ thể đã tạo ra chúng — cùng loại dữ liệu với trường reco-data của PlayActivity, nhưng cũng đến từ phía hiển thị (impression) của vòng lặp.
settings.troubleshooting.impressionReporting.warning2: Đây là dữ liệu đo lường gửi đi thực tế tới Apple ngoài luồng PlayActivity mà Cider đã gửi. Chỉ bật nếu bạn muốn có sự đồng bộ hóa cá nhân hóa hoàn toàn với music.apple.com.
