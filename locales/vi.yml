oobe.amupsell.amWebUrl: https://beta.music.apple.com/
oobe.amupsell.explainBtn: Giải thích
oobe.amupsell.promoExplained: "Một số gói dùng thử Apple Music khuyến mãi và không thuộc Mỹ không có quyền truy cập vào API Apple Music Web Player cần thiết để Cider hoạt động. Để xác minh xem bản dùng thử đang hoạt động của bạn có hoạt động với Cider hay không, hãy truy cập <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>  đăng nhập và thử phát một số bài nhạc. Nếu nó hoạt động, tuyệt vời! Bạn đã sẵn sàng để sử dụng Cider, tuy nhiên nếu nó không hoạt động, hãy cân nhắc việc đăng ký Apple Music tại đây: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Đăng ký Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider cần bạn có một gói đăng ký Apple Music trả phí, đang hoạt động
  Cider sẽ không hoạt động với Apple Music Voice Plan hoặc một số bản đăng ký dùng thử khuyến mại. Nếu bạn đã có một gói Apple Music đủ điều kiện, hãy nhấp vào nút Tiếp theo.
oobe.amupsell.title: Trước khi tiếp tục
oobe.audio.text: |-
  Cider cung cấp âm thanh được điều chỉnh và thiết kế mang lại trải nghiệm âm thanh chất lượng cao đa dạng.
  Nổi bật với Cider Adrenaline, Atmosphere Realizer và Âm thanh không gian hóa.
  Để bật chức năng này, "Chức năng âm thanh nâng cao" phải được bật.
  Việc bật Chức năng âm thanh nâng cao sẽ cung cấp cho bạn quyền truy cập vào những cải tiến này trong Cider Audio Labs, có trong cài đặt của ứng dụng.
oobe.audio.title: Âm thanh
oobe.done: Xong
oobe.general.title: Cài đặt chung
oobe.intro.text: Hãy thiết lập một số thứ để bạn có thể sử dụng Cider theo ý bạn muốn. Bạn luôn có thể thay đổi các cài đặt này về sau.
oobe.intro.title: Chào mừng đến với Cider
oobe.next: Tiếp theo
oobe.no: Không
oobe.previous: Trước đó
oobe.visual.layout.text: |-
  Cider có hai giao diện bố cục khác nhau.
  Maverick là một bố cục giống như iTunes với trình phát ở đầu cửa sổ.
  Mojave là một giao diện mới được tạo bởi Cider Collective.

  Bạn có thể thay đổi bố cục bất cứ lúc nào trong cài đặt.
