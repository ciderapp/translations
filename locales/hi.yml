smartPlaylist.mix.tally.title: मिक्स तैयार है
smartPlaylist.mix.vibeLabel: वाइब
smartPlaylist.mix.writeMode.catalog: पूरी डिस्कोग्राफी
smartPlaylist.mix.writeMode.catalogTooltip: Apple Music पर इस कलाकार के हर ट्रैक को लिया जा रहा है। अपनी लाइब्रेरी तक सीमित करने के लिए क्लिक करें।
smartPlaylist.mix.writeMode.library: सहेजे गए ट्रैक
smartPlaylist.mix.writeMode.libraryTooltip: केवल वही गाने मैच किए जा रहे हैं जो पहले से आपकी लाइब्रेरी में हैं। पूरी डिस्कोग्राफी प्राप्त करने के लिए क्लिक करें।
smartPlaylist.term.ruleManaged: नियम-प्रबंधित
smartPlaylist.term.smartPlaylist: प्लेलिस्ट नियम
smartPlaylist.writeMode.addToLibrary.subtitle: केवल आपकी लाइब्रेरी में पहले से मौजूद गानों तक ही सीमित रखता है — कुछ भी नया इम्पोर्ट नहीं किया जाता है।
smartPlaylist.writeMode.addToLibrary.title: केवल मेरे सहेजे गए गानों से मिलान करें
smartPlaylist.writeMode.appleSyncFootnote: 'ध्यान दें: जब Apple Music की "प्लेलिस्ट के गानों को लाइब्रेरी में जोड़ें" सेटिंग चालू होती है (iOS, iPadOS, macOS और Android पर डिफ़ॉल्ट), तो Cider द्वारा लाइब्रेरी प्लेलिस्ट में जोड़े गए कोई भी कैटलॉग ट्रैक उन डिवाइस पर आपकी "गाने" लाइब्रेरी में आ जाएंगे। कैटलॉग मिलान को केवल प्लेलिस्ट तक सीमित रखने के लिए Apple Music ऐप में इस सेटिंग को बंद करें।'
smartPlaylist.writeMode.catalog.subtitle: तेज़ — Cider कैटलॉग संदर्भों को सीधे प्लेलिस्ट में लिखता है। ट्रैक Apple Music कैटलॉग से चलते हैं।
smartPlaylist.writeMode.catalog.title: कैटलॉग संदर्भों के रूप में रखें
smartPlaylist.writeMode.description: इस कलाकार के कुछ गाने शायद अभी आपकी लाइब्रेरी में न हों। चुनें कि Cider को उन्हें प्लेलिस्ट में कैसे जोड़ना चाहिए।
smartPlaylist.writeMode.title: कैटलॉग मिलान कैसे सहेजे जाने चाहिए?
