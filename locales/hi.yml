smartPlaylist.header.lastApplied: नियम आखिरी बार लागू किए गए
smartPlaylist.mix.addArtist: कलाकार जोड़ें
smartPlaylist.mix.building.title: आपका मिक्स तैयार किया जा रहा है
smartPlaylist.mix.catalogSyncHint: 'ध्यान दें: Apple Music की "प्लेलिस्ट के गानों को लाइब्रेरी में जोड़ें" सेटिंग चालू होने पर (iOS, iPadOS, macOS और Android पर डिफ़ॉल्ट रूप से चालू), पूरी डिस्कोग्राफी (Full discography) के मैच उन डिवाइस पर आपकी "गाने" लाइब्रेरी में आ जाएंगे। उन्हें केवल प्लेलिस्ट तक सीमित रखने के लिए Apple Music ऐप में इस सेटिंग को बंद करें।'
smartPlaylist.mix.customizedBanner: इस मिक्स को नियम (Rules) टैब में कस्टमाइज़ किया गया है। यहाँ से सहेजने पर वे बदलाव नीचे दिए गए डिस्क सेट से बदल दिए जाएंगे।
smartPlaylist.mix.descriptionLabel: विवरण
smartPlaylist.mix.descriptionOverridden: कस्टम विवरण — स्वचालित रूप से फिर से जनरेट करने के लिए बॉक्स को खाली करें।
smartPlaylist.mix.descriptionPlaceholder: विवरण देखने के लिए किसी कलाकार को चुनें।
smartPlaylist.mix.maxReached: यह अधिकतम सीमा है — प्रति मिक्स छह कलाकार फ़्लो को बेहतर बनाए रखते हैं।
smartPlaylist.mix.mixedWriteHint: यदि कोई भी डिस्क पूरी डिस्कोग्राफी पर सेट है, तो पूरा मिक्स Apple Music से लिया जाएगा। मैचों को पूरी तरह से अपनी लाइब्रेरी के भीतर रखने के लिए हर डिस्क को सहेजे गए ट्रैक पर सेट करें।
smartPlaylist.mix.needArtist: पहले कम से कम एक कलाकार चुनें
smartPlaylist.mix.regenerate: एक अलग विवरण जनरेट करें
smartPlaylist.mix.removeArtist: कलाकार हटाएं
smartPlaylist.mix.searchPlaceholder: कलाकार खोजें…
smartPlaylist.mix.spinUp: मिक्स तैयार करें
