settings.troubleshooting.hevcWorkaround.desc: कुछ GPUs के साथ WebView2 में आने वाले बग के लिए वर्कअराउंड, जिनमें विज़ुअल शिफ्ट की भरपाई के लिए फ़िल्टर लागू करके 10-बिट SDR HEVC प्लेबैक में समस्या आती है।
settings.troubleshooting.impressionReporting: PlayActivity इंप्रेशन रिपोर्टिंग
settings.troubleshooting.impressionReporting.warning1: यह xp.apple.com/report/2/xp_its_music_main पर शेल्फ़-व्यू और क्लिक टेलीमेट्री भेजता है, जो music.apple.com के वेब प्लेयर द्वारा भेजे जाने वाले डेटा से मेल खाता है। इससे Apple का रिकमेंडेशन इंजन प्लेबैक को उस विशिष्ट सुझाव से जोड़ पाता है जिससे वे उत्पन्न हुए थे — यह हमारे PlayActivity रिको-डेटा फ़ील्ड के समान ही डेटा है, लेकिन यह लूप के इम्प्रेशन साइड से भी आता है।
settings.troubleshooting.impressionReporting.warning2: यह Apple को भेजी जाने वाली वास्तविक आउटबाउंड टेलीमेट्री है, जो Cider द्वारा पहले से भेजे जाने वाले PlayActivity स्ट्रीम से अलग है। इसे केवल तभी सक्षम करें यदि आप music.apple.com के साथ पूर्ण वैयक्तिकरण समानता चाहते हैं।
