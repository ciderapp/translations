oobe.audio.text: |-
  Cider में एक कस्टम ट्यून और डिज़ाइन किया गया ऑडियो स्टैक है जो एक समृद्ध उच्च गुणवत्ता वाला ऑडियो अनुभव प्रदान करता है।
  इसमें Cider Adrenaline, Atmosphere Realizer और Spatialized Audio शामिल हैं।
  इस कार्यक्षमता को सक्षम करने के लिए "Advanced Audio Functionality" सक्षम होना चाहिए।
