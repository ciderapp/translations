settings.troubleshooting.bgDiagnostics.desc: विंडो के मिनिमाइज़ या अनफ़ोकस्ड होने पर प्लेबैक समस्याओं के निदान के लिए अतिरिक्त लॉग ब्रेडक्रम्ब्स — जैसे कि प्लेयर को किसने पॉज़ किया, टाइमर स्टार्वेशन, और OS सस्पेंशन एपिसोड। बैकग्राउंड प्लेबैक बग की रिपोर्ट करते समय इसे सक्षम करें।
