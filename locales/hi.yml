oobe.visual.layout.text: |-
  Cider में दो अलग-अलग विंडो लेआउट हैं।
  Maverick एक iTunes जैसा लेआउट है जिसमें प्लेयर विंडो के शीर्ष पर होता है।
  Mojave, Cider Collective द्वारा बनाया गया एक नया रूप है।

  आप सेटिंग्स में किसी भी समय लेआउट बदल सकते हैं।
