oobe.amupsell.promoExplained: "कुछ प्रचारक और गैर-अमेरिकी Apple Music ट्रायल सब्सक्रिप्शन के पास Cider के काम करने के लिए आवश्यक Apple Music Web Player API का एक्सेस नहीं होता है। यह जांचने के लिए कि आपका सक्रिय ट्रायल Cider के साथ काम करेगा या नहीं, <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a> पर जाएं, लॉग इन करें और कुछ संगीत चलाने का प्रयास करें। यदि यह काम करता है, तो बहुत बढ़िया! आप Cider का उपयोग करने के लिए तैयार हैं, लेकिन यदि यह काम नहीं करता है, तो यहाँ Apple Music को सब्सक्राइब करने पर विचार करें: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Apple Music को सब्सक्राइब करें
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider के लिए एक सक्रिय, सशुल्क Apple Music सब्सक्रिप्शन की आवश्यकता होती है
  Cider, Apple Music Voice Plan या कुछ प्रचारक ट्रायल सब्सक्रिप्शन के साथ काम नहीं करेगा। यदि आपके पास पहले से ही एक योग्य Apple Music सब्सक्रिप्शन है, तो जारी रखने के लिए 'आगे बढ़ें' पर क्लिक करें।
oobe.amupsell.title: शुरू करने से पहले
