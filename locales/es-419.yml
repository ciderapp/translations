oobe.amupsell.promoExplained: "Algunas suscripciones de prueba promocionales y de fuera de EE. UU. de Apple Music no tienen acceso a las API del reproductor web de Apple Music necesarias para que Cider funcione. Para verificar si tu prueba activa funcionará con Cider, ve a <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, inicia sesión e intenta reproducir música. Si funciona, ¡excelente! Ya puedes usar Cider. De lo contrario, considera suscribirte a Apple Music aquí: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Suscribirse a Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider requiere una suscripción activa y de pago a Apple Music.
  Cider no funcionará con el plan Apple Music Voice ni con algunas suscripciones de prueba promocionales. Si ya tienes una suscripción elegible a Apple Music, haz clic en Siguiente para continuar.
oobe.amupsell.title: Antes de empezar
