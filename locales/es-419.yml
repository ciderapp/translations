oobe.audio.text: |-
  Cider cuenta con una pila de audio personalizada y diseñada a medida que ofrece una experiencia de audio enriquecida y de alta calidad.
  Con Cider Adrenaline, Atmosphere Realizer y Spatialized Audio.
  Para activar esta característica, se debe habilitar la "Funcionalidad de audio avanzada".
  Al habilitar la Funcionalidad de audio avanzada, tendrás acceso a estas mejoras en Cider Audio Labs, que se encuentran en la configuración de la aplicación.
