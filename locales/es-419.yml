settings.troubleshooting.impressionReporting.warning1: Envía telemetría de clics y vistas de estantes a xp.apple.com/report/2/xp_its_music_main, coincidiendo con lo que emite el reproductor web de music.apple.com. Permite que el motor de recomendaciones de Apple atribuya las reproducciones a la recomendación específica que las produjo; los mismos datos que nuestro campo reco-data de PlayActivity, pero provenientes también del lado de las impresiones del ciclo.
settings.troubleshooting.impressionReporting.warning2: Esta es telemetría saliente real hacia Apple, más allá del flujo de PlayActivity que Cider ya envía. Actívala solo si deseas una paridad de personalización completa con music.apple.com.
