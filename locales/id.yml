oobe.amupsell.explainBtn: Jelaskan
oobe.amupsell.promoExplained: "Beberapa promosi uji coba Apple Music dan akun non AS tidak memiliki akses ke Apple Music Web Player API yang diperlukan agar Cider berfungsi.  Untuk memverifikasi apakah uji coba aktif Anda akan berfungsi dengan Cider, buka <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a> masuk dan coba putar musik. Jika berhasil, bagus! Anda siap menggunakan Cider, namun jika tidak mempertimbangkan untuk berlangganan Apple Music di sini: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Berlangganan Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider memerlukan langganan Apple Music yang aktif
  Cider tidak akan berfungsi dengan Apple Music Voice Plan atau beberapa langganan uji coba promosi. Jika Anda sudah berlangganan Apple Music yang memenuhi syarat, klik Berikutnya untuk melanjutkan.
oobe.amupsell.title: Sebelum kita mulai
oobe.audio.text: |-
  Cider menghadirkan tumpukan audio yang disesuaikan dan dirancang khusus. Serta menghadirkan pengalaman audio berkualitas tinggi yang baik.
  Dengan fitur seperti Cider Adrenaline, Atmosphere Realizer, dan Spatialized Audio.
  Untuk mengaktifkan fungsi ini "Pengaturan Audio Tingkat Lanjut" harus dinyalakan.
  Mengaktifkan Pengaturan Audio Tingkat Lanjut akan memberi Anda akses ke peningkatan ini di Lab Audio Cider, yang ditemukan di pengaturan aplikasi
oobe.audio.title: Audio
oobe.done: Selesai
oobe.general.title: Umum
oobe.intro.text: Mari kita siapkan beberapa hal agar Anda dapat menggunakan Cider sesuai keinginan Anda. Anda selalu dapat mengubah setelan ini nanti.
oobe.intro.title: Selamat Datang di Cider
oobe.next: Berikutnya
oobe.no: Tidak
oobe.previous: Sebelumnya
oobe.visual.layout.text: |-
  Cider menampilkan dua jendela tata letak yang berbeda.
  Maverick adalah tata letak seperti iTunes dengan pemutar di bagian atas jendela.
  Mojave adalah putaran baru yang dibuat oleh tim Cider Collective.

  Anda dapat mengubah tata letak kapan saja di setelan.
