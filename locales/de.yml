oobe.amupsell.explainBtn: Erklären
oobe.amupsell.promoExplained: "Einige Probeabonnements und Werbeaktionen für Apple Music (außerhalb der USA) haben keinen Zugriff auf die erforderlichen Apple Music Web Player-APIs, die Cider benötigt. Um zu überprüfen, ob dein aktives Probeabo mit Cider funktioniert, gehe auf <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, melde dich an und versuche, Musik abzuspielen. Wenn es funktioniert, super! Du kannst Cider jetzt nutzen. Falls nicht, kannst du Apple Music hier abonnieren: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Apple Music abonnieren
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider erfordert ein aktives, kostenpflichtiges Apple Music Abonnement.
  Cider funktioniert nicht mit dem Apple Music Voice-Abo oder bestimmten Probeabonnements. Wenn du bereits ein berechtigtes Apple Music Abonnement hast, klicke auf „Weiter“.
oobe.amupsell.title: Bevor wir beginnen
