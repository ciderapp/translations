oobe.amupsell.explainBtn: Erklären
oobe.amupsell.promoExplained: "Einige Werbe- und Nicht-US-Probeabonnements von Apple Music haben keinen Zugriff auf die erforderlichen Apple Music Web Player-APIs, die für die Funktion von Cider benötigt werden. Um zu überprüfen, ob dein aktives Probeabonnement mit Cider funktioniert, gehe auf <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, melde dich an und versuche, Musik abzuspielen. Wenn es funktioniert, super! Du bist bereit für Cider. Wenn nicht, ziehe in Erwägung, Apple Music hier zu abonnieren: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Apple Music abonnieren
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider erfordert ein aktives, kostenpflichtiges Apple Music Abonnement.
  Cider funktioniert nicht mit dem Apple Music Voice-Abo oder bestimmten Werbe-Probeabonnements. Wenn du bereits ein berechtigtes Apple Music Abonnement hast, klicke auf „Weiter“, um fortzufahren.
oobe.amupsell.title: Bevor wir beginnen
oobe.audio.advancedFunctionality: ""
oobe.audio.subtitle: ""
oobe.audio.text: |-
  Cider verfügt über ein speziell abgestimmtes und entwickeltes Audio-System, das ein reichhaltiges, hochwertiges Audioerlebnis bietet.
  Mit Cider Adrenaline, Atmosphere Realizer und Spatialized Audio.
  Um diese Funktionen zu nutzen, muss die „Erweiterte Audio-Funktionalität“ aktiviert sein.
  Durch das Aktivieren der erweiterten Audio-Funktionalität erhältst du Zugriff auf diese Verbesserungen in den Cider Audio Labs, die in den App-Einstellungen zu finden sind.
