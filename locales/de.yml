settings.troubleshooting.impressionReporting.warning1: Sendet Shelf-View- und Klick-Telemetriedaten an xp.apple.com/report/2/xp_its_music_main, entsprechend den Daten des Web-Players von music.apple.com. Ermöglicht es der Empfehlungs-Engine von Apple, Wiedergaben der spezifischen Empfehlung zuzuordnen, die sie hervorgerufen hat – dieselben Daten wie unser PlayActivity-reco-data-Feld, jedoch zusätzlich von der Impression-Seite der Schleife.
settings.troubleshooting.impressionReporting.warning2: Dies sind echte ausgehende Telemetriedaten an Apple außerhalb des PlayActivity-Streams, den Cider bereits sendet. Aktiviere dies nur, wenn du eine vollständige Personalisierungsparität mit music.apple.com wünschst.
