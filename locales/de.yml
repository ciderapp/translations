oobe.audio.text: |-
  Cider verfügt über eine speziell abgestimmte und entwickelte Audio-Engine, die ein detailreiches und hochwertiges Klangerlebnis bietet.
  Mit an Bord sind Cider Adrenaline, Atmosphere Realizer und Spatialized Audio.
  Um diese Funktionen zu nutzen, muss die „Erweiterte Audiofunktionalität“ aktiviert sein.
  Durch das Aktivieren der erweiterten Audiofunktionalität erhältst du Zugriff auf diese Verbesserungen in den Cider Audio Labs, die du in den App-Einstellungen findest.
