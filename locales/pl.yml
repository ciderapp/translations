settings.troubleshooting.mkliteDebug: Rejestrowanie debugowania MKLite
settings.troubleshooting.mkliteDebug.desc: Szczegółowe dane wyjściowe konsoli z MKLite — ładunki PlayActivity (JSPLAY), zmiany utworów i stan odtwarzania. Przydatne przy porównywaniu danych wysyłanych do Apple z music.apple.com. Wyłącz do normalnego użytku.
