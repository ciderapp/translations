settings.troubleshooting.hevcWorkaround.desc: Obejście błędu w WebView2 występującego na niektórych procesorach graficznych mających problemy z odtwarzaniem 10-bitowego wideo SDR HEVC, polegające na zastosowaniu filtra kompensującego przesunięcie wizualne.
settings.troubleshooting.impressionReporting: Raportowanie wyświetleń PlayActivity
settings.troubleshooting.impressionReporting.warning1: Wysyła telemetrię wyświetleń półek i kliknięć do xp.apple.com/report/2/xp_its_music_main, dopasowując ją do danych wysyłanych przez odtwarzacz sieciowy music.apple.com. Pozwala to silnikowi rekomendacji Apple przypisać odtworzenia do konkretnej rekomendacji, która je wywołała – są to te same dane, co w naszym polu reco-data PlayActivity, ale pochodzące również ze strony wyświetleń.
settings.troubleshooting.impressionReporting.warning2: Są to rzeczywiste wychodzące dane telemetryczne do Apple, wykraczające poza strumień PlayActivity, który Cider już wysyła. Włącz tę opcję tylko wtedy, gdy chcesz uzyskać pełną spójność personalizacji z music.apple.com.
