  Cider posiada specjalnie dostrojony i zaprojektowany silnik audio, który zapewnia bogate wrażenia dźwiękowe wysokiej jakości.
  Zawiera on technologie Cider Adrenaline, Atmosphere Realizer oraz Spatialized Audio.
  Aby włączyć te funkcje, należy aktywować „Zaawansowane funkcje audio”.
  Włączenie tej opcji da Ci dostęp do tych ulepszeń w sekcji Cider Audio Labs, którą znajdziesz w ustawieniach aplikacji.
