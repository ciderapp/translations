settings.troubleshooting.mkliteDebug: Logowanie debugowania MKLite
settings.troubleshooting.mkliteDebug.desc: Szczegółowe dane wyjściowe konsoli z MKLite — ładunki PlayActivity (JSPLAY), zmiany utworów i stan odtwarzania. Przydatne przy porównywaniu danych wysyłanych do Apple z music.apple.com. Wyłącz przy normalnym użytkowaniu.
settings.troubleshooting.mkLoadingMethod: Metoda ładowania MusicKit
settings.troubleshooting.mkLoadingMethod.warning1: Zmień metodę ładowania MusicKit. Służy to do rozwiązywania potencjalnych problemów z ładowaniem po aktualizacjach MusicKit.
settings.troubleshooting.mkLoadingMethod.warning2: To ustawienie NIE powinno być zmieniane, chyba że wiesz, co robisz, lub otrzymasz takie polecenie.
settings.troubleshooting.mkLoadingMethod.warning3: Ta opcja nie służy do rozwiązywania ogólnych problemów z połączeniem lub odtwarzaniem.
