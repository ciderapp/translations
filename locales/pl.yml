  value: "Niektóre promocyjne subskrypcje próbne lub subskrypcje próbne spoza Stanów Zjednoczonych nie mają dostępu do API Web Playera Apple Music, które wymagane jest do działania Cider. Aby sprawdzić, czy Twój aktywny okres próbny będzie działał z Cider, przejdź do <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, zaloguj się i spróbuj odtworzyć jakąś muzykę. Jeśli zadziała, to świetnie, możesz śmiało używać Cider! Jeśli jednak odtwarzanie nie zadziałało, pomyśl nad zakupem subskrypcji Apple Music tutaj: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
  source: human
  by: "@szymin22"
  issue: 34
