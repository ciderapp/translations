settings.troubleshooting.hevcWorkaround.desc: Obejście błędu w WebView2 na niektórych procesorach graficznych, które mają problemy z odtwarzaniem 10-bitowego wideo SDR HEVC, poprzez zastosowanie filtra kompensującego przesunięcie wizualne.
settings.troubleshooting.impressionReporting: Raportowanie wyświetleń PlayActivity
settings.troubleshooting.impressionReporting.warning1: Wysyła telemetrię wyświetleń i kliknięć do xp.apple.com/report/2/xp_its_music_main, odpowiadając zachowaniu odtwarzacza sieciowego music.apple.com. Pozwala to silnikowi rekomendacji Apple przypisywać odtworzenia do konkretnych rekomendacji, które je wywołały — to te same dane, co w polu reco-data usługi PlayActivity, ale przesyłane również z poziomu wyświetleń.
settings.troubleshooting.impressionReporting.warning2: Są to rzeczywiste wychodzące dane telemetryczne do Apple, wykraczające poza strumień PlayActivity, który Cider już wysyła. Włącz tę opcję tylko wtedy, gdy chcesz uzyskać pełną spójność personalizacji z music.apple.com.
