oobe.amupsell.amWebUrl: https://beta.music.apple.com/
oobe.amupsell.explainBtn: Wyjaśnienie
oobe.amupsell.promoExplained: "Niektóre promocyjne subskrypcje próbne lub subskrypcje próbne spoza Stanów Zjednoczonych nie mają dostępu do API Web Playera Apple Music, które wymagane jest do działania Cider. Aby sprawdzić, czy Twój aktywny okres próbny będzie działał z Ciderem, przejdź do <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, zaloguj się i spróbuj odtworzyć jakąś muzykę. Jeśli zadziała, to świetnie, możesz śmiało używać Cider! Jeśli jednak odtwarzanie nie zadziałało, pomyśl nad zakupem subskrypcji Apple Music tutaj: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Kup subskrypcję Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider wymaga aktywnej, opłaconej subskrypcji Apple Music subscription
  Cider nie będzie działał z Apple Music Voice Plan lub innymi promocyjnymi próbnymi subskrypcjami.  Jeśli posiadasz aktywną subskrypcję Apple Music, kliknij Dalej, aby kontynuować.
oobe.amupsell.title: Zanim zaczniemy
oobe.audio.text: |-
  Cider posiada specjalnie zaprojektowany i dostrojony zestaw ustawień audio, który zapewnia bogate, wysokiej jakości wrażenia dźwiękowe.
  Między innymi są to Cider Adrenaline, Atmosphere Realizer, i Dźwięk przestrzenny.
  Aby skorzystać z tych usprawnień, musisz włączyć "Zaawansowaną funkcjonalność Audio".
  Włączenie tej opcji da Ci dostęp do wcześniej wymienionych usprawnień w sekcji Cider Audio Labs, którą znajdziesz w ustawieniach aplikacji.
oobe.audio.title: Dźwięk
oobe.done: Zrobione
oobe.general.title: Ogólne
oobe.intro.text: Na początek dostosujmy kilka ustawień, abyś mógł korzystać z Cider tak jak lubisz. Możesz również zmienić te ustawienia później.
oobe.intro.title: Witaj w odtwarzaczu Cider
oobe.next: Następny
oobe.no: Nie
oobe.previous: Poprzedni
oobe.visual.layout.text: |-
  Cider posiada dwa różne układy okien.
  Maverick wzorowany jest na iTunes z odtwarzaczem na górze okna.
  Mojave to nowy układ stworzony przez Cider Collective.

  Możesz je przełączyć w dowolnej chwili w ustawieniach.
oobe.visual.title: Wygląd
