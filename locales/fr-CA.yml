oobe.amupsell.promoExplained: "Certains abonnements d'essai promotionnels et non américains à Apple Music n'ont pas accès aux API du lecteur web d'Apple Music requises pour le fonctionnement de Cider. Pour vérifier si votre essai actif fonctionnera avec Cider, rendez-vous sur <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, connectez-vous et essayez de faire jouer de la musique. Si cela fonctionne, tant mieux! Vous êtes prêt à utiliser Cider. Dans le cas contraire, vous pouvez vous abonner à Apple Music ici : <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: S'abonner à Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider nécessite un abonnement payant et actif à Apple Music.
  Cider ne fonctionnera pas avec l'abonnement Apple Music Voice ni avec certains abonnements d'essai promotionnels. Si vous possédez déjà un abonnement Apple Music admissible, cliquez sur Suivant pour continuer.
