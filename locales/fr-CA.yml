settings.troubleshooting.hevcWorkaround.desc: Solution de contournement pour un bogue dans WebView2 avec certains processeurs graphiques qui éprouvent des problèmes lors de la lecture HEVC SDR 10 bits en appliquant un filtre pour compenser le décalage visuel.
settings.troubleshooting.impressionReporting: Rapport d'impressions PlayActivity
settings.troubleshooting.impressionReporting.warning1: Envoie la télémétrie des clics et de l'affichage des sections à xp.apple.com/report/2/xp_its_music_main, ce qui correspond à ce que le lecteur web de music.apple.com émet. Permet au moteur de recommandation d'Apple d'attribuer les lectures à la recommandation spécifique qui les a générées — les mêmes données que notre champ reco-data de PlayActivity, mais provenant également du côté impression de la boucle.
settings.troubleshooting.impressionReporting.warning2: Il s'agit d'une véritable télémétrie sortante vers Apple, au-delà du flux PlayActivity que Cider envoie déjà. Activez cette option uniquement si vous souhaitez une parité de personnalisation complète avec music.apple.com.
