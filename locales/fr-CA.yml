settings.troubleshooting.bgDiagnostics.desc: Traces de journalisation supplémentaires pour diagnostiquer les problèmes de lecture lorsque la fenêtre est réduite ou inactive (qui a mis le lecteur en pause, épuisement du minuteur et suspensions du système d'exploitation). Activez cette option lors du signalement d'un bogue de lecture en arrière-plan.
settings.troubleshooting.desc: Fichiers journaux et débogage de MKLite.
settings.troubleshooting.hevcWorkaround: Contournement HEVC
settings.troubleshooting.hevcWorkaround.desc: Solution de contournement pour un bogue dans WebView2 avec certains GPU qui éprouvent des difficultés avec la lecture HEVC SDR 10 bits, en appliquant un filtre pour compenser le décalage visuel.
settings.troubleshooting.impressionReporting: Rapport d'impressions PlayActivity
settings.troubleshooting.impressionReporting.warning1: Envoie la télémétrie des clics et des vues de sections à xp.apple.com/report/2/xp_its_music_main, correspondant à ce que le lecteur web de music.apple.com émet. Permet au moteur de recommandation d'Apple d'attribuer les lectures à la recommandation spécifique qui les a générées — les mêmes données que notre champ reco-data de PlayActivity, mais provenant également du côté impression de la boucle.
settings.troubleshooting.impressionReporting.warning2: Il s'agit d'une véritable télémétrie sortante vers Apple, au-delà du flux PlayActivity que Cider envoie déjà. Activez cette option uniquement si vous souhaitez une parité de personnalisation complète avec music.apple.com.
settings.troubleshooting.logFile: Fichier journal
settings.troubleshooting.logFile.actions: Actions du fichier journal
settings.troubleshooting.logFile.desc: Afficher, copier ou effacer votre fichier journal
settings.troubleshooting.mkliteDebug: Journalisation du débogage de MKLite
settings.troubleshooting.mkliteDebug.desc: Sortie console détaillée de MKLite — charges utiles PlayActivity (JSPLAY), changements de piste et état de lecture. Utile pour comparer ce que nous envoyons à Apple avec music.apple.com. Laissez désactivé pour une utilisation normale.
settings.troubleshooting.mkLoadingMethod: Méthode de chargement de MusicKit
settings.troubleshooting.mkLoadingMethod.warning1: Modifie la méthode utilisée pour charger MusicKit. Cela permet de résoudre d'éventuels problèmes de chargement liés aux mises à jour de MusicKit.
settings.troubleshooting.mkLoadingMethod.warning2: Ce paramètre ne doit PAS être modifié à moins que vous ne sachiez ce que vous faites ou que l'on vous ait demandé de le faire.
settings.troubleshooting.mkLoadingMethod.warning3: Cette option n'est pas destinée à résoudre les problèmes généraux de connexion ou de lecture.
settings.troubleshooting.rebootMk: Redémarrer MusicKit
settings.troubleshooting.rebootMk.desc: Redémarrer MusicKit pour résoudre les problèmes de lecture
settings.troubleshooting.testSignIn: Tester la connexion à Apple Music
settings.troubleshooting.testSignIn.desc: Lancez la fenêtre de connexion à Apple Music pour vérifier que la connexion fonctionne, puis validez le jeton auprès de l'API. Rien n'est enregistré et votre session actuelle reste inchangée.
