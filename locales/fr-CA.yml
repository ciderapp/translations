oobe.audio.text: |-
  Cider propose une architecture audio personnalisée et optimisée qui offre une expérience sonore riche et de haute qualité.
  Elle comprend Cider Adrenaline, Atmosphere Realizer et l'audio spatialisé.
  Pour activer ces fonctionnalités, l'option « Fonctionnalités audio avancées » doit être activée.
  L'activation des fonctionnalités audio avancées vous donnera accès à ces améliorations dans les Cider Audio Labs, situés dans les réglages de l'application.
