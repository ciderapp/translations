settings.troubleshooting.testSignIn.desc: Lansați fereastra pop-up de autentificare Apple Music pentru a verifica dacă funcționează conectarea, apoi validați tokenul prin API. Nu se salvează nimic, iar sesiunea curentă rămâne neafectată.
