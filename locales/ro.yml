settings.troubleshooting.bgDiagnostics: Diagnosticare redare în fundal
settings.troubleshooting.bgDiagnostics.desc: Informații suplimentare de jurnalizare pentru diagnosticarea problemelor de redare în timp ce fereastra este minimizată sau inactivă — cine a întrerupt redarea, epuizarea temporizatorului și episoadele de suspendare ale sistemului de operare. Activează când raportezi o eroare de redare în fundal.
