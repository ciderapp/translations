settings.troubleshooting.impressionReporting: Raportare impresii PlayActivity
settings.troubleshooting.impressionReporting.warning1: Trimite telemetrie de tip shelf-view și click către xp.apple.com/report/2/xp_its_music_main, la fel ca playerul web music.apple.com. Permite motorului de recomandări Apple să asocieze redările cu recomandarea specifică ce le-a generat — aceleași date ca în câmpul reco-data din PlayActivity, dar provenind și din partea de afișare (impression) a fluxului.
settings.troubleshooting.impressionReporting.warning2: Aceasta este o telemetrie de ieșire reală către Apple, în plus față de fluxul PlayActivity pe care Cider îl trimite deja. Activează doar dacă dorești o paritate completă de personalizare cu music.apple.com.
