settings.troubleshooting.mkliteDebug: Jurnalizare depanare MKLite
settings.troubleshooting.mkliteDebug.desc: Mesaje detaliate în consolă de la MKLite — date utile PlayActivity (JSPLAY), modificări de piese și starea redării. Util pentru a compara datele trimise către Apple cu cele de pe music.apple.com. Dezactivează pentru utilizare normală.
settings.troubleshooting.mkLoadingMethod: Metodă de încărcare MusicKit
settings.troubleshooting.mkLoadingMethod.warning1: Schimbă metoda utilizată pentru a încărca MusicKit; aceasta este folosită pentru a rezolva eventualele probleme de încărcare cauzate de actualizările MusicKit.
settings.troubleshooting.mkLoadingMethod.warning2: Această setare NU ar trebui modificată decât dacă știi ce faci sau dacă ți s-a cerut acest lucru.
settings.troubleshooting.mkLoadingMethod.warning3: Această opțiune nu este destinată rezolvării problemelor generale de conexiune sau redare.
