settings.troubleshooting.mkliteDebug.desc: Ieșire detaliată în consolă de la MKLite — date utile PlayActivity (JSPLAY), schimbări de piese și starea redării. Util pentru a compara ceea ce trimitem către Apple cu music.apple.com. Lasă dezactivat pentru utilizare normală.
