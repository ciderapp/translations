oobe.audio.text: |-
  Cider dispune de un motor audio personalizat și optimizat, care oferă o experiență audio bogată și de înaltă calitate.
  Include Cider Adrenaline, Atmosphere Realizer și Spatialized Audio.
  Pentru a activa această caracteristică, trebuie să activezi „Funcționalitate audio avansată”.
  Activarea acesteia îți va oferi acces la aceste îmbunătățiri în Cider Audio Labs, secțiune care se găsește în configurările aplicației.
