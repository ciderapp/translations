oobe.amupsell.promoExplained: "Unele abonamente promoționale și de încercare Apple Music din afara SUA nu au acces la API-urile Apple Music Web Player necesare pentru funcționarea Cider. Pentru a verifica dacă abonamentul tău de încercare activ va funcționa cu Cider, accesează <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, autentifică-te și încearcă să redai muzică. Dacă funcționează, excelent! Ești gata să folosești Cider. În caz contrar, ia în considerare abonarea la Apple Music aici: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Abonează-te la Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider necesită un abonament activ și plătit la Apple Music.
  Cider nu va funcționa cu Apple Music Voice Plan sau cu anumite abonamente promoționale de încercare. Dacă ai deja un abonament Apple Music compatibil, fă clic pe Înainte pentru a continua.
