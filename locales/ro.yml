settings.troubleshooting.hevcWorkaround.desc: Soluție de compromis pentru o eroare din WebView2 cu anumite plăci grafice care au probleme la redarea HEVC SDR pe 10 biți, prin aplicarea unui filtru pentru a compensa decalajul vizual.
settings.troubleshooting.impressionReporting: Raportare impresii PlayActivity
settings.troubleshooting.impressionReporting.warning1: Trimite telemetria de afișare a rafturilor și de clic către xp.apple.com/report/2/xp_its_music_main, corespunzând cu ceea ce emite playerul web al music.apple.com. Permite motorului de recomandări Apple să asocieze redările cu recomandarea specifică ce le-a generat — aceleași date ca și câmpul nostru de date de recomandare PlayActivity, dar provenind și din partea de afișare a buclei.
settings.troubleshooting.impressionReporting.warning2: Aceasta este o telemetrie de ieșire autentică către Apple, dincolo de fluxul PlayActivity pe care Cider îl trimite deja. Activează doar dacă dorești o paritate completă de personalizare cu music.apple.com.
