settings.troubleshooting.bgDiagnostics: Diagnostika prehrávania na pozadí
settings.troubleshooting.bgDiagnostics.desc: Dodatočné záznamy v logoch na diagnostiku problémov s prehrávaním, keď je okno minimalizované alebo neaktívne – kto pozastavil prehrávač, vyčerpanie časovača a pozastavenia zo strany OS. Povoľte pri nahlasovaní chyby prehrávania na pozadí.
