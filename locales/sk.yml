oobe.amupsell.explainBtn: Vysvetliť
oobe.amupsell.promoExplained: "Niektoré propagačné a mimo-americké skúšobné predplatné Apple Music nemajú prístup k potrebným rozhraniam Apple Music Web Player API, ktoré Cider vyžaduje pre svoje fungovanie. Ak chcete overiť, či bude vaše aktívne skúšobné predplatné fungovať s aplikáciou Cider, prejdite na <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, prihláste sa a skúste prehrať hudbu. Ak to funguje, skvelé! Ste pripravení používať Cider. Ak nie, zvážte predplatné Apple Music tu: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Predplatiť si Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider vyžaduje aktívne, platené predplatné Apple Music.
  Cider nebude fungovať s programom Apple Music Voice Plan ani s niektorými propagačnými skúšobnými predplatnými. Ak už máte vhodné predplatné Apple Music, pokračujte kliknutím na Ďalej.
oobe.amupsell.title: Skôr než začneme
oobe.appearance.accentHint: Používa sa pre tlačidlá, zvýraznenia a priebeh v celej aplikácii. Vyskúšajte si ho, náhľad sa zobrazuje naživo.
