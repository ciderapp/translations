settings.troubleshooting.mkliteDebug: Ladenie protokolovania MKLite
settings.troubleshooting.mkliteDebug.desc: Podrobný výstup konzoly z MKLite – dáta PlayActivity (JSPLAY), zmeny skladieb a stav prehrávania. Užitočné pri porovnávaní toho, čo odosielame spoločnosti Apple, s music.apple.com. Pre bežné používanie ponechajte vypnuté.
settings.troubleshooting.mkLoadingMethod: Metóda načítania MusicKit
settings.troubleshooting.mkLoadingMethod.warning1: Zmena metódy používanej na načítanie MusicKit. Používa sa na riešenie potenciálnych problémov s načítaním po aktualizáciách MusicKit.
settings.troubleshooting.mkLoadingMethod.warning2: Toto nastavenie by sa NEMALO meniť, pokiaľ presne neviete, čo robíte, alebo ste na to neboli vyzvaní.
settings.troubleshooting.mkLoadingMethod.warning3: Táto možnosť nie je určená na riešenie všeobecných problémov s pripojením alebo prehrávaním.
