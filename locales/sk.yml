oobe.amupsell.amWebUrl: https://beta.music.apple.com/
oobe.amupsell.explainBtn: Vysvetli
oobe.amupsell.promoExplained: "Niektoré propagačné a neamerické skúšobné predplatné Apple Music nemajú prístup k potrebným API webového prehrávača Apple Music, ktoré sú potrebné na fungovanie aplikácie Cider. Ak chcete overiť, či vaše aktívne skúšobné predplatné bude fungovať s aplikáciou Cider, prejdite na <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, prihláste sa a skúste prehrať nejakú hudbu. Ak to funguje, skvelé! Ste pripravení používať Cider, ak však nie, zvážte predplatenie Apple Music tu: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Odoberať Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider vyžaduje aktívne, platené predplatné Apple Music.
  Cider nefunguje s Apple Music Voice predplatným ani s niektorými propagačnými skúšobnými variantami Apple Music predplatného. Ak máte správne predplatné, kliknite Ďalej.
oobe.amupsell.title: Before we start
oobe.audio.text: |-
  
  Cider obsahuje na mieru vyladený a navrhnutý audio systém, ktorý poskytuje bohatý a vysoko kvalitný zvukový zážitok.
  Obsahuje funkcie Cider Adrenaline, Atmosphere Realizer a Priestorový zvuk.
  Ak chcete túto funkciu povoliť, musíte zapnúť „Pokročilé zvukové funkcie“.
  Zapnutím pokročilých zvukových funkcií získate prístup k týmto vylepšeniam v Cider Audio Labs, ktoré nájdete v nastaveniach aplikácie.
oobe.audio.title: Zvuk
oobe.done: Hotovo
oobe.general.title: Všeobecné
oobe.intro.text: Prejdime si nastavenia niekoľkých vecí, aby ste mohli použivať Cider, ako chcete. Vždy budete môcť tieto nastavenia zmeniť.
oobe.intro.title: Vitajte v Cider
oobe.next: Ďalší
oobe.no: Nie
oobe.previous: Predchádzajúci
oobe.visual.layout.text: |-
  Cider obsahuje 2 rôzne rozloženia panelov.
  Maverick je rozloženie inšpirované iTunes s prehrávačom na vrchu okna.
  Mojave je nová varianta od Cider Collective.

  Rozloženie si môžete kedykoľvek zmeniť v nastaveniach.
