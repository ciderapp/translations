settings.troubleshooting.impressionReporting: Hlásenie zobrazení PlayActivity
settings.troubleshooting.impressionReporting.warning1: Odosiela telemetriu zobrazení sekcií a kliknutí na adresu xp.apple.com/report/2/xp_its_music_main, čo zodpovedá správaniu webového prehrávača music.apple.com. Umožňuje odporúčaciemu systému Apple priradiť prehratia ku konkrétnemu odporúčaniu, ktoré ich vyvolalo – rovnaké údaje ako v našom poli reco-data pre PlayActivity, ale odosielané aj zo strany zobrazení v cykle.
settings.troubleshooting.impressionReporting.warning2: Ide o skutočnú odchádzajúcu telemetriu pre Apple nad rámec streamu PlayActivity, ktorý Cider už odosiela. Povoľte ju iba v prípade, že chcete dosiahnuť úplnú zhodu v personalizácii s music.apple.com.
