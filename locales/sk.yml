settings.troubleshooting.hevcWorkaround.desc: Riešenie chyby vo WebView2 pri niektorých grafických kartách, ktoré majú problémy s prehrávaním 10-bitového SDR HEVC, aplikovaním filtra na kompenzáciu vizuálneho posunu.
settings.troubleshooting.impressionReporting: Hlásenie zobrazení PlayActivity
settings.troubleshooting.impressionReporting.warning1: Odosiela telemetriu zobrazení sekcií a kliknutí na adresu xp.apple.com/report/2/xp_its_music_main, čo zodpovedá tomu, čo odosiela webový prehrávač music.apple.com. Umožňuje odporúčaciemu systému Apple priradiť prehratia ku konkrétnemu odporúčaniu, ktoré ich vygenerovalo – rovnaké dáta ako v našom poli reco-data pre PlayActivity, ale pochádzajúce aj zo strany zobrazení.
settings.troubleshooting.impressionReporting.warning2: Ide o skutočnú odchádzajúcu telemetriu do Apple nad rámec streamu PlayActivity, ktorý Cider už odosiela. Povoľte len vtedy, ak chcete úplnú paritu personalizácie s music.apple.com.
