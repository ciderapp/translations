oobe.audio.subtitle: ""
oobe.audio.text: |-
  Cider obsahuje špeciálne vyladenú a navrhnutú zvukovú architektúru, ktorá poskytuje bohatý a vysokokvalitný zvukový zážitok.
  Obsahuje technológie Cider Adrenaline, Atmosphere Realizer a Spatialized Audio.
  Na povolenie tejto funkcie musí byť zapnutá možnosť „Rozšírené zvukové funkcie“.
  Povolením rozšírených zvukových funkcií získate prístup k týmto vylepšeniam v sekcii Cider Audio Labs, ktorú nájdete v nastaveniach aplikácie.
