oobe.amupsell.explainBtn: Uitleggen
oobe.amupsell.promoExplained: "Sommige promotionele en niet-Amerikaanse proefabonnementen op Apple Music hebben geen toegang tot de vereiste Apple Music Web Player API's die nodig zijn om Cider te laten werken. Om te controleren of uw actieve proefversie met Cider werkt, gaat u naar: <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a> log in en probeer wat muziek af te spelen. Als het werkt, prima! Je bent klaar om Cider te gebruiken, maar als het niet werkt kunt u hier abonneren op Apple Music: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Abonneren op Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider vereist een actief, betaald Apple Music-abonnement
  Cider werkt niet met Apple Music Voice Plan of sommige promotionele proefabonnementen. Als je al een gekwalificeerd Apple Music-abonnement hebt, klikt u op Volgende om door te gaan.
oobe.amupsell.title: Voordat we starten
oobe.audio.text: |-
  Cider beschikt over een op maat afgestemde en ontworpen audio-stack die een rijke audio-ervaring van hoge kwaliteit levert, door middel van Cider Adrenaline, Atmosfeer Realisator en Ruimtelijke Audio.
  Om deze functionaliteit in te schakelen, moet "Geavanceerde audiofunctionaliteit" zijn ingeschakeld.
  Als u geavanceerde audiofunctionaliteit inschakelt, krijgt u toegang tot deze verbeteringen in de Cider Audio Lab, te vinden in de app-instellingen.
