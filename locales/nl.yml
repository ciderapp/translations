settings.troubleshooting.impressionReporting.warning1: Verstuurt shelf-weergave- en kliktelemetrie naar xp.apple.com/report/2/xp_its_music_main, wat overeenkomt met wat de webspeler van music.apple.com verzendt. Hiermee kan de aanbevelingsengine van Apple afgespeelde nummers toeschrijven aan de specifieke aanbeveling die ze heeft gegenereerd — dezelfde gegevens als ons PlayActivity reco-data-veld, maar ook afkomstig van de impressiezijde van de lus.
settings.troubleshooting.impressionReporting.warning2: Dit is daadwerkelijke uitgaande telemetrie naar Apple buiten de PlayActivity-stroom die Cider al verzendt. Schakel dit alleen in als je volledige personalisatie-overeenstemming wilt met music.apple.com.
