oobe.audio.text: |-
  Cider beschikt over een speciaal afgestemde en ontworpen audiostream die een rijke, hoogwaardige audio-ervaring levert.
  Met onder andere Cider Adrenaline, Atmosphere Realizer en Spatialized Audio.
  Om deze functionaliteit te gebruiken, moet 'Geavanceerde audiofunctionaliteit' zijn ingeschakeld.
  Als je Geavanceerde audiofunctionaliteit inschakelt, krijg je toegang tot deze verbeteringen in de Cider Audio Labs, te vinden in de app-instellingen.
