oobe.amupsell.promoExplained: "Joillakin kampanjatilauksilla ja Yhdysvaltojen ulkopuolisilla Apple Music -kokeilujaksoilla ei ole pääsyä tarvittaviin Apple Music Web Player -rajapintoihin, joita Cider tarvitsee toimiakseen. Voit tarkistaa kokeilujaksosi toimivuuden Ciderin kanssa siirtymällä osoitteeseen <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, kirjautumalla sisään ja yrittämällä toistaa musiikkia. Jos se toimii, hienoa! Olet valmis käyttämään Cideria. Jos se ei toimi, harkitse Apple Musicin tilaamista täältä: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
