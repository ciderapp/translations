oobe.audio.text: |-
  Cider sisältää räätälöidyn ja suunnitellun äänipinon, joka tarjoaa täyteläisen ja korkealaatuisen äänikokemuksen.
  Ominaisuuksiin kuuluvat Cider Adrenaline, Atmosphere Realizer ja Spatialized Audio.
  Tämän toiminnon käyttöönottamiseksi "Edistyneet äänitoiminnot" on otettava käyttöön.
  Edistyneiden äänitoimintojen käyttöönotto antaa sinulle pääsyn näihin parannuksiin Cider Audio Labs -osiossa, joka löytyy sovelluksen asetuksista.
