oobe.amupsell.text: |-
  Cider vaatii aktiivisen, maksullisen Apple Music -tilauksen.
  Cider ei toimi Apple Music Voice -tilauksella tai joillakin kampanjakokeilujaksoilla. Jos sinulla on jo soveltuva Apple Music -tilaus, jatka napsauttamalla Seuraava.
