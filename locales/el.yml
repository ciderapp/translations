  Το Cider διαθέτει δύο διαφορετικές διατάξεις παραθύρου.
  Η Maverick είναι μια διάταξη παρόμοια με το iTunes, με το πρόγραμμα αναπαραγωγής στο επάνω μέρος του παραθύρου.
