smartPlaylist.writeMode.catalog.subtitle: Ταχύτερα — Το Cider γράφει αναφορές καταλόγου απευθείας στη λίστα αναπαραγωγής. Τα κομμάτια αναπαράγονται από τον κατάλογο του Apple Music.
smartPlaylist.writeMode.catalog.title: Διατήρηση ως αναφορές καταλόγου
smartPlaylist.writeMode.description: Ορισμένα τραγούδια από αυτόν τον καλλιτέχνη ενδέχεται να μην βρίσκονται ακόμη στη βιβλιοθήκη σας. Επιλέξτε πώς θα πρέπει το Cider να τα προσθέσει στη λίστα αναπαραγωγής.
