settings.troubleshooting.hevcWorkaround.desc: Παράκαμψη για ένα σφάλμα στο WebView2 με ορισμένες κάρτες γραφικών (GPU) που αντιμετωπίζουν προβλήματα με την αναπαραγωγή 10-bit SDR HEVC, εφαρμόζοντας ένα φίλτρο για την αντιστάθμιση της οπτικής μετατόπισης.
settings.troubleshooting.impressionReporting: Αναφορά εμφανίσεων PlayActivity
settings.troubleshooting.impressionReporting.warning1: Στέλνει τηλεμετρία προβολής ραφιού και κλικ στο xp.apple.com/report/2/xp_its_music_main, αντίστοιχη με αυτήν που εκπέμπει το πρόγραμμα αναπαραγωγής ιστού του music.apple.com. Επιτρέπει στη μηχανή προτάσεων της Apple να αποδίδει τις αναπαραγωγές στη συγκεκριμένη πρόταση που τις παρήγαγε — τα ίδια δεδομένα με το πεδίο reco-data του PlayActivity, αλλά προερχόμενα και από την πλευρά των εμφανίσεων του κύκλου.
settings.troubleshooting.impressionReporting.warning2: Πρόκειται για πραγματική εξερχόμενη τηλεμετρία προς την Apple, πέρα από τη ροή PlayActivity που στέλνει ήδη το Cider. Ενεργοποιήστε το μόνο εάν επιθυμείτε πλήρη ισοτιμία εξατομίκευσης με το music.apple.com.
