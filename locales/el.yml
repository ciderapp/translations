oobe.amupsell.promoExplained: "Ορισμένες δοκιμαστικές συνδρομές Apple Music (προωθητικές ή εκτός ΗΠΑ) δεν έχουν πρόσβαση στα απαιτούμενα API του Apple Music Web Player που είναι απαραίτητα για τη λειτουργία του Cider. Για να επαληθεύσετε εάν η ενεργή δοκιμαστική σας συνδρομή λειτουργεί με το Cider, μεταβείτε στο <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, συνδεθείτε και δοκιμάστε να αναπαράγετε μουσική. Εάν λειτουργεί, τέλεια! Είστε έτοιμοι να χρησιμοποιήσετε το Cider. Αν όχι, σκεφτείτε να εγγραφείτε στο Apple Music εδώ: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Εγγραφή στο Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Το Cider απαιτεί μια ενεργή, επί πληρωμή συνδρομή Apple Music
  Το Cider δεν λειτουργεί με το Apple Music Voice Plan ή με ορισμένες προωθητικές δοκιμαστικές συνδρομές. Εάν έχετε ήδη μια κατάλληλη συνδρομή Apple Music, κάντε κλικ στο Επόμενο για να συνεχίσετε.
oobe.amupsell.title: Πριν ξεκινήσουμε
oobe.appearance.accentHint: Χρησιμοποιείται για κουμπιά, επισημάνσεις και την πρόοδο στην εφαρμογή. Δοκιμάστε ένα, η προεπισκόπηση είναι ζωντανή.
