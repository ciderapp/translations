oobe.appearance.title: Κάντε το Cider δικό σας
oobe.audio.advancedFunctionality: ""
oobe.audio.subtitle: ""
oobe.audio.text: |-
  Το Cider διαθέτει μια ειδικά σχεδιασμένη και ρυθμισμένη αρχιτεκτονική ήχου που προσφέρει μια πλούσια εμπειρία ήχου υψηλής ποιότητας.
  Περιλαμβάνει τα Cider Adrenaline, Atmosphere Realizer και Spatialized Audio.
  Για να ενεργοποιήσετε αυτήν τη δυνατότητα, πρέπει να είναι ενεργοποιημένη η «Προηγμένη λειτουργικότητα ήχου».
  Η ενεργοποίηση της Προηγμένης λειτουργικότητας ήχου θα σας δώσει πρόσβαση σε αυτές τις βελτιώσεις στο Cider Audio Labs, το οποίο βρίσκεται στις ρυθμίσεις της εφαρμογής.
