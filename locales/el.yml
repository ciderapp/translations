settings.troubleshooting.mkliteDebug: Καταγραφή εντοπισμού σφαλμάτων MKLite
settings.troubleshooting.mkliteDebug.desc: Λεπτομερής έξοδος κονσόλας από το MKLite — δεδομένα PlayActivity (JSPLAY), αλλαγές κομματιών και κατάσταση αναπαραγωγής. Χρήσιμο για τη σύγκριση των δεδομένων που στέλνουμε στην Apple με το music.apple.com. Αφήστε το απενεργοποιημένο για κανονική χρήση.
