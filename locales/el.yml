oobe.intro.text: Ας ρυθμίσουμε μερικά πράγματα για να μπορείτε να χρησιμοποιείτε τον Cider όπως σας αρέσει. Μπορείτε να αλλάξετε αυτές τις ρυθμίσεις όποτε θελήσετε αργότερα.
