smartPlaylist.writeMode.addToLibrary.title: Αντιστοίχιση μόνο των αποθηκευμένων κομματιών μου
smartPlaylist.writeMode.appleSyncFootnote: "Προσοχή: όταν η ρύθμιση «Προσθήκη τραγουδιών λίστας στη βιβλιοθήκη» του Apple Music είναι ενεργοποιημένη (η προεπιλογή σε iOS, iPadOS, macOS και Android), τυχόν κομμάτια καταλόγου που προσθέτει το Cider σε μια λίστα αναπαραγωγής βιβλιοθήκης θα εμφανιστούν στη βιβλιοθήκη «Τραγούδια» σε αυτές τις συσκευές. Απενεργοποιήστε αυτήν τη ρύθμιση στην εφαρμογή Apple Music για να παραμείνουν οι αντιστοιχίες καταλόγου μόνο στη λίστα αναπαραγωγής."
smartPlaylist.writeMode.catalog.subtitle: Ταχύτερα — Το Cider γράφει αναφορές καταλόγου απευθείας στη λίστα αναπαραγωγής. Τα κομμάτια αναπαράγονται από τον κατάλογο του Apple Music.
smartPlaylist.writeMode.catalog.title: Διατήρηση ως αναφορές καταλόγου
smartPlaylist.writeMode.description: Ορισμένα τραγούδια από αυτόν τον καλλιτέχνη ενδέχεται να μην βρίσκονται ακόμη στη βιβλιοθήκη σας. Επιλέξτε πώς θα πρέπει το Cider να τα προσθέσει στη λίστα αναπαραγωγής.
smartPlaylist.writeMode.title: Πώς πρέπει να αποθηκεύονται οι αντιστοιχίες καταλόγου;
