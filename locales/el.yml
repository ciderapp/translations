settings.troubleshooting.mkliteDebug.desc: Λεπτομερής έξοδος κονσόλας από το MKLite — ωφέλιμα φορτία PlayActivity (JSPLAY), αλλαγές κομματιών και κατάσταση αναπαραγωγής. Χρήσιμο κατά τη σύγκριση των δεδομένων που στέλνουμε στην Apple με το music.apple.com. Αφήστε το απενεργοποιημένο για κανονική χρήση.
