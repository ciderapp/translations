settings.troubleshooting.impressionReporting.warning1: music.apple.comのウェブプレイヤーが送信するものと同様に、シェルフビューとクリックのテレメトリをxp.apple.com/report/2/xp_its_music_mainに送信します。これにより、Appleの推奨エンジンが、再生をそれを生成した特定の推奨に関連付けることができます。これは、当社のPlayActivity推奨データフィールドと同じデータですが、ループのインプレッション側からも送信されます。
settings.troubleshooting.impressionReporting.warning2: これは、Ciderがすでに送信しているPlayActivityストリームを超えて、Appleに送信される本物の送信テレメトリです。music.apple.comと完全にパーソナライズを同期させたい場合のみ有効にしてください。
