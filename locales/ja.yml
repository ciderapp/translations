settings.troubleshooting.impressionReporting.warning2: これは、Cider がすでに送信している PlayActivity ストリームとは別に、Apple に直接送信される実際のテレメトリです。music.apple.com と完全に同じパーソナライズを適用したい場合のみ有効にしてください。
