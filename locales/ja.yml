oobe.audio.text: |-
  Cider は、豊かで高品質なオーディオ体験を提供する、独自に調整・設計されたオーディオスタックを搭載しています。
  Cider Adrenaline、Atmosphere Realizer、および Spatialized Audio を備えています。
  この機能を利用するには、「高度なオーディオ機能」を有効にする必要があります。
  「高度なオーディオ機能」を有効にすると、アプリ設定内にある Cider Audio Labs でこれらの拡張機能を利用できるようになります。
