settings.troubleshooting.mkliteDebug: Registro de depuração do MKLite
settings.troubleshooting.mkliteDebug.desc: Saída detalhada do console do MKLite — payloads de PlayActivity (JSPLAY), alterações de faixa e estado de reprodução. Útil para comparar o que enviamos à Apple com o music.apple.com. Deixe desativado para uso normal.
settings.troubleshooting.mkLoadingMethod: Método de Carregamento do MusicKit
settings.troubleshooting.mkLoadingMethod.warning1: Altere o método usado para carregar o MusicKit. Isso é usado para resolver possíveis problemas de carregamento decorrentes de atualizações do MusicKit.
settings.troubleshooting.mkLoadingMethod.warning2: Esta configuração NÃO deve ser alterada, a menos que você saiba o que está fazendo ou tenha recebido instruções para isso.
settings.troubleshooting.mkLoadingMethod.warning3: Esta opção não se destina a resolver problemas gerais de conexão ou reprodução.
