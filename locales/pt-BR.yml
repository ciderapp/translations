settings.troubleshooting.bgDiagnostics: Diagnóstico de Reprodução em Segundo Plano
settings.troubleshooting.bgDiagnostics.desc: Rastros de log adicionais para diagnosticar problemas de reprodução enquanto a janela está minimizada ou fora de foco — quem pausou o reprodutor, esgotamento de timer e episódios de suspensão do SO. Ative ao relatar um bug de reprodução em segundo plano.
