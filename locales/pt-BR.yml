settings.troubleshooting.mkLoadingMethod: Método de Carregamento do MusicKit
settings.troubleshooting.mkLoadingMethod.warning1: Altera o método usado para carregar o MusicKit. Isso é usado para resolver possíveis problemas de carregamento decorrentes de atualizações do MusicKit.
settings.troubleshooting.mkLoadingMethod.warning2: Esta configuração NÃO deve ser alterada, a menos que você saiba o que está fazendo ou tenha recebido instruções para isso.
