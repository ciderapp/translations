oobe.amupsell.promoExplained: "Algumas assinaturas promocionais e de teste do Apple Music fora dos EUA não têm acesso às APIs do Apple Music Web Player necessárias para o funcionamento do Cider. Para verificar se o seu teste ativo funcionará com o Cider, acesse <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, faça login e tente reproduzir alguma música. Se funcionar, ótimo! Você está pronto para usar o Cider. Caso contrário, considere assinar o Apple Music aqui: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
