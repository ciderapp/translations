oobe.audio.text: |-
  O Cider possui um mecanismo de áudio personalizado e projetado sob medida que oferece uma experiência sonora rica e de alta qualidade.
  Apresentando Cider Adrenaline, Atmosphere Realizer e Spatialized Audio.
  Para ativar esse recurso, a "Funcionalidade de Áudio Avançada" deve estar ativada.
  Ativar a Funcionalidade de Áudio Avançada dará acesso a essas melhorias no Cider Audio Labs, localizado nas configurações do aplicativo.
