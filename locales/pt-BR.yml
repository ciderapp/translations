oobe.amupsell.text: |-
  O Cider requer uma assinatura ativa e paga do Apple Music
  O Cider não funcionará com o Apple Music Voice Plan ou com algumas assinaturas de teste promocionais. Se você já possui uma assinatura qualificada do Apple Music, clique em Avançar para continuar.
