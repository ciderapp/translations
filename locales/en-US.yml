settings.troubleshooting.mkliteDebug.desc: Verbose console output from MKLite — PlayActivity payloads (JSPLAY), track changes, and playback state. Useful when comparing what we send to Apple against music.apple.com. Leave off for normal use.
settings.troubleshooting.mkLoadingMethod: MusicKit Loading Method
settings.troubleshooting.mkLoadingMethod.warning1: Change the method used to load MusicKit, this is used to address potential loading issues from MusicKit updates.
settings.troubleshooting.mkLoadingMethod.warning2: This setting should NOT be changed unless you know what you are doing or are instructed to do so.
settings.troubleshooting.mkLoadingMethod.warning3: This option is not meant to address general connection or playback issues.
