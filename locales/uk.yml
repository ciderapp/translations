settings.troubleshooting.hevcWorkaround.desc: Виправлення помилки у WebView2 на деяких графічних процесорах, які мають проблеми з відтворенням 10-бітного SDR HEVC, шляхом застосування фільтра для компенсації візуального зсуву.
settings.troubleshooting.impressionReporting: Звітування про покази PlayActivity
settings.troubleshooting.impressionReporting.warning1: Надсилає телеметрію переглядів розділів та кліків на xp.apple.com/report/2/xp_its_music_main, що відповідає даним вебплеєра music.apple.com. Це дозволяє системі рекомендацій Apple пов'язувати відтворення з конкретною рекомендацією, яка їх викликала — ті самі дані, що й у нашому полі reco-data PlayActivity, але також з боку показів.
settings.troubleshooting.impressionReporting.warning2: Це справжня вихідна телеметрія до Apple, окрім потоку PlayActivity, який Cider вже надсилає. Вмикайте лише якщо вам потрібна повна відповідність персоналізації з music.apple.com.
