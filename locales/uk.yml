oobe.amupsell.promoExplained: "Деякі акційні та неамериканські пробні підписки Apple Music не мають доступу до необхідних API вебплеєра Apple Music, які потрібні для роботи Cider. Щоб перевірити, чи працюватиме ваша активна пробна версія з Cider, перейдіть на <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, увійдіть у систему та спробуйте відтворити музику. Якщо все працює — чудово! Ви готові до використання Cider. Якщо ні, радимо оформити підписку на Apple Music тут: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Підписатися на Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Для роботи Cider потрібна активна платна підписка Apple Music.
  Cider не працюватиме з тарифом Apple Music Voice або деякими акційними пробними підписками. Якщо у вас уже є відповідна підписка Apple Music, натисніть «Далі», щоб продовжити.
