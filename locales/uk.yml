oobe.audio.subtitle: ""
oobe.audio.text: |-
  Cider має спеціально налаштований та розроблений аудіостек, який забезпечує насичений та високоякісний звук.
  Він містить Cider Adrenaline, Atmosphere Realizer та Spatialized Audio.
  Щоб увімкнути ці можливості, необхідно активувати «Розширені аудіофункції».
  Увімкнення розширених аудіофункцій надасть вам доступ до цих покращень у Cider Audio Labs, які можна знайти в налаштуваннях програми.
