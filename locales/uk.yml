oobe.amupsell.amWebUrl: https://beta.music.apple.com/
oobe.amupsell.explainBtn: Пояснити
oobe.amupsell.promoExplained: "Деякі пробні підписки на Apple Music із рекламними акціями та не в США не мають доступу до необхідного API-інтерфейсу Apple Music Web Player, необхідного для роботи Cider. Щоб перевірити, чи ваша активна пробна версія працюватиме з Cider, перейдіть до <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a> увійдіть і спробуйте відтворити музику. Якщо це працює, чудово! Ви готові використовувати Cider, але якщо він не передбачає підписку на Apple Music: <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: Підписатися на Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Для Cider потрібна активна платна підписка на Apple Music
  Cider не працюватиме з тарифним планом Apple Music Voice або деякими акційними пробними підписками. Якщо у вас уже є повноцінна підписка на Apple Music, натисніть «Далі», щоб продовжити.
oobe.amupsell.title: Перед початком
oobe.audio.text: |-
  Cider містить спеціально налаштований і розроблений стек аудіо, який забезпечує насичене високоякісне звучання.
  Включаючи Cider Adrenaline, Atmosphere Realizer і Spatialized Audio.
  Щоб увімкнути цю функцію, потрібно ввімкнути "Advanced Audio Functionality".
  Увімкнення Advanced Audio надасть вам доступ до цих покращень у Cider Audio Labs, які можна знайти в налаштуваннях програми.
oobe.audio.title: Аудіо
