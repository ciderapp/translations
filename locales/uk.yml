settings.troubleshooting.mkliteDebug.desc: Детальний вивід у консоль від MKLite — корисні дані PlayActivity (JSPLAY), зміни треків та стан відтворення. Корисно для порівняння даних, які ми надсилаємо Apple, з music.apple.com. Вимкніть для звичайного використання.
