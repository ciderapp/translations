oobe.general.title: Головні
oobe.intro.text: Давайте налаштуємо кілька речей, щоб ви могли використовувати Cider, як забажаєте. Ви завжди можете змінити ці налаштування пізніше.
oobe.intro.title: Вітаємо в Cider
oobe.next: Наступний
oobe.no: Ні
oobe.previous: Попередній
oobe.visual.layout.text: |-
  Cider має два різні макети вікон.
  Maverick — це макет, схожий на iTunes, із програвачем у верхній частині вікна.
  Mojave — це нова функція, створена Cider Collective.

  Ви можете будь-коли змінити макет у налаштуваннях.
