settings.troubleshooting.mkliteDebug: Налагоджувальне ведення журналу MKLite
settings.troubleshooting.mkliteDebug.desc: Детальний вивід у консоль від MKLite — корисні дані PlayActivity (JSPLAY), зміни треків та стан відтворення. Корисно для порівняння даних, які ми надсилаємо Apple, з music.apple.com. Вимкніть для звичайного використання.
settings.troubleshooting.mkLoadingMethod: Спосіб завантаження MusicKit
settings.troubleshooting.mkLoadingMethod.warning1: Зміна способу завантаження MusicKit. Використовується для вирішення можливих проблем із завантаженням після оновлень MusicKit.
settings.troubleshooting.mkLoadingMethod.warning2: Цей параметр НЕ слід змінювати, якщо ви не впевнені у своїх діях або не отримали відповідних вказівок.
settings.troubleshooting.mkLoadingMethod.warning3: Ця опція не призначена для вирішення загальних проблем із підключенням або відтворенням.
