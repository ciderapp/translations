settings.troubleshooting.impressionReporting: Звітування про покази PlayActivity
settings.troubleshooting.impressionReporting.warning1: Надсилає телеметрію переглядів полиць та кліків на xp.apple.com/report/2/xp_its_music_main, що відповідає даним вебплеєра music.apple.com. Це дозволяє рекомендаційній системі Apple пов'язувати відтворення з конкретною рекомендацією, яка його викликала — ті самі дані, що й у нашому полі reco-data в PlayActivity, але також і з боку показів.
settings.troubleshooting.impressionReporting.warning2: Це справжня вихідна телеметрія до Apple, окрім потоку PlayActivity, який Cider уже надсилає. Увімкніть, лише якщо хочете повної відповідності персоналізації з music.apple.com.
