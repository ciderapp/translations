oobe.amupsell.promoExplained: "Certains abonnements d'essai promotionnels et non américains à Apple Music n'ont pas accès aux API requises de l'Apple Music Web Player nécessaires au fonctionnement de Cider. Pour vérifier si votre essai actif fonctionnera avec Cider, rendez-vous sur <a href='{{ amWebUrl }}'>{{ amWebUrl }}</a>, connectez-vous et essayez de lancer de la musique. Si cela fonctionne, tant mieux ! Vous êtes prêt à utiliser Cider. Si ce n'est pas le cas, vous pouvez vous abonner à Apple Music ici : <a href='{{ subscribeUrl }}'>{{ subscribeUrl }}</a>"
oobe.amupsell.subscribeBtn: S'abonner à Apple Music
oobe.amupsell.subscribeUrl: https://apple.co/3MdqJVQ
oobe.amupsell.text: |-
  Cider nécessite un abonnement actif et payant à Apple Music.
  Cider ne fonctionnera pas avec l'offre Apple Music Voice ou certains abonnements d'essai promotionnels. Si vous disposez déjà d'un abonnement Apple Music éligible, cliquez sur Suivant pour continuer.
oobe.amupsell.title: Avant de commencer
oobe.audio.advancedFunctionality: ""
oobe.audio.subtitle: ""
oobe.audio.text: |-
  Cider intègre un moteur audio personnalisé et optimisé qui offre une expérience sonore riche et de haute qualité.
  Il comprend Cider Adrenaline, Atmosphere Realizer et Spatialized Audio.
  Pour activer ces fonctionnalités, l'option « Fonctionnalités audio avancées » doit être activée.
  L'activation des fonctionnalités audio avancées vous donnera accès à ces améliorations dans le Cider Audio Labs, situé dans les paramètres de l'application.
