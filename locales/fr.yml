  Cider propose deux dispositions de fenêtre différentes.
  Maverick est une disposition de style iTunes avec le lecteur en haut de la fenêtre.
  Mojave est une nouvelle approche créée par le Cider Collective.

  Vous pouvez changer de disposition à tout moment dans les paramètres.
