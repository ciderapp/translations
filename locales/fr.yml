settings.troubleshooting.hevcWorkaround.desc: Solution de contournement pour un bug dans WebView2 avec certains GPU qui rencontrent des problèmes lors de la lecture HEVC SDR 10 bits, en appliquant un filtre pour compenser le décalage visuel.
settings.troubleshooting.impressionReporting: Rapports d'impressions PlayActivity
settings.troubleshooting.impressionReporting.warning1: Envoie les données de télémétrie d'affichage et de clic à xp.apple.com/report/2/xp_its_music_main, correspondant à ce que transmet le lecteur web de music.apple.com. Permet au moteur de recommandation d'Apple d'associer les lectures à la recommandation spécifique qui les a générées — les mêmes données que notre champ reco-data PlayActivity, mais provenant également du côté impression de la boucle.
settings.troubleshooting.impressionReporting.warning2: Il s'agit d'une véritable télémétrie sortante vers Apple, au-delà du flux PlayActivity que Cider envoie déjà. Activez cette option uniquement si vous souhaitez une parité de personnalisation totale avec music.apple.com.
