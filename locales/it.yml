settings.troubleshooting.hevcWorkaround.desc: Soluzione alternativa per un bug in WebView2 con alcune GPU che riscontrano problemi con la riproduzione HEVC SDR a 10 bit, applicando un filtro per compensare lo sfasamento visivo.
settings.troubleshooting.impressionReporting: Segnalazione delle impressioni di PlayActivity
settings.troubleshooting.impressionReporting.warning1: Invia la telemetria delle visualizzazioni degli scaffali e dei clic a xp.apple.com/report/2/xp_its_music_main, corrispondente a quanto emesso dal web player di music.apple.com. Consente al motore di raccomandazione di Apple di attribuire le riproduzioni alla raccomandazione specifica che le ha generate — gli stessi dati del nostro campo reco-data di PlayActivity, ma provenienti anche dal lato delle impressioni del ciclo.
settings.troubleshooting.impressionReporting.warning2: Si tratta di telemetria in uscita autentica verso Apple, oltre al flusso PlayActivity già inviato da Cider. Attiva solo se desideri una parità di personalizzazione completa con music.apple.com.
