settings.troubleshooting.mkliteDebug.desc: Output dettagliato della console da MKLite — payload PlayActivity (JSPLAY), cambi di traccia e stato di riproduzione. Utile per confrontare ciò che inviamo ad Apple con music.apple.com. Disattiva per l'uso normale.
